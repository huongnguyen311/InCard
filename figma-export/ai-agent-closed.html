<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — AI Agent (Closed State)</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #009037;
      --green-light: #2eb07a;
      --emerald: #10b981;
      --mint: #6ee7b7;
      --green-100: #dcfce7;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-500: #64748b;
      --slate-100: #f1f5f9;
      --slate-50: #f8fafc;
      --white: #ffffff;
      --green-glow: rgba(46,176,122,0.5);
      --grad-brand: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      --hero-bg: linear-gradient(to bottom right, #0f172a, #111827, #000000);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100vh; margin: 0; padding: 0; }
    body {
      background: var(--hero-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.3) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 10% 80%, rgba(20, 184, 166, 0.2) 0%, transparent 40%);
      background-size: 800px 800px;
      animation: blobShift 15s ease-in-out infinite;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .nav-buttons {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: background 0.2s ease, transform 0.2s ease;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: rgba(46,176,122,0.3);
      border-color: rgba(46,176,122,0.6);
      transform: translateX(-2px);
    }

    .nav-btn svg { width: 16px; height: 16px; }

    .landing {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 26px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero {
      position: relative;
      z-index: 2;
      max-width: 550px;
      text-align: center;
      margin-bottom: 60px;
    }

    .hero h1 {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      color: #fff;
      margin-bottom: 20px;
    }

    .hero h1 .grad {
      background: linear-gradient(92deg, var(--green-light) 0%, var(--mint) 60%, var(--emerald) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
    }

    .widget-closed {
      position: relative;
      width: 280px;
      height: 200px;
    }

    .launcher-av {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 80px;
      height: 80px;
      cursor: pointer;
      animation: float 5s ease-in-out infinite;
      filter: drop-shadow(0 12px 26px rgba(0,144,55,0.5));
    }

    .launcher-av .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #009037, #2eb07a, #6ee7b7, #10b981, #009037);
      animation: spin 4.5s linear infinite;
    }

    .launcher-av .av {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #fff;
      background: var(--green-100);
      z-index: 1;
    }

    .launcher-av .av img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .launcher-av::before, .launcher-av::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      border: 2px solid var(--green-light);
      animation: pulse-ring 2.6s ease-out infinite;
    }

    .launcher-av::after { animation-delay: 1.3s; }

    .launcher-av .odot {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #4ade80;
      border: 2.5px solid #fff;
      z-index: 3;
      animation: online-pulse 2s ease-out infinite;
    }

    .launcher-av .wave {
      position: absolute;
      bottom: -6px;
      left: -8px;
      font-size: 26px;
      z-index: 3;
      animation: wave 2.4s ease-in-out infinite;
      transform-origin: 70% 70%;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .teaser {
      position: absolute;
      top: 0;
      left: 0;
      width: 240px;
      z-index: 9;
      background: #fff;
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 18px 18px 4px 18px;
      padding: 15px 16px;
      box-shadow: 0 18px 44px rgba(0,0,0,0.38);
      animation: teaser-in 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    }

    .teaser::after {
      content: "";
      position: absolute;
      bottom: -7px;
      right: 30px;
      width: 16px;
      height: 16px;
      background: #fff;
      transform: rotate(45deg);
      border-right: 1px solid rgba(0,0,0,0.04);
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .teaser .greet {
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.2px;
      margin-bottom: 8px;
    }

    .teaser p {
      font-size: 13px;
      line-height: 1.4;
      color: #64748b;
      margin-bottom: 12px;
    }

    .teaser .cta {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 11px;
      background: var(--grad-brand);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,144,55,0.42);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
    }

    .teaser .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,144,55,0.5);
    }

    .teaser .cta svg { width: 16px; height: 16px; }

    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes wave { 0%,60%,100% { transform: rotate(0deg); } 15%,45% { transform: rotate(18deg); } 30% { transform: rotate(-8deg); } }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.65; } 100% { transform: scale(1.9); opacity: 0; } }
    @keyframes online-pulse { 0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); } 100% { box-shadow: 0 0 0 7px rgba(74,222,128,0); } }
    @keyframes teaser-in { 0% { opacity: 0; transform: translateY(14px) scale(0.85); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes blobShift { 0% { background-position: 0% 0%, 100% 0%, 0% 100%; } 50% { background-position: 50% 50%, 50% 50%, 50% 50%; } 100% { background-position: 0% 0%, 100% 0%, 0% 100%; } }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="nav-buttons">
    <a class="nav-btn" href="ai-agent-choose.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> Chọn concept
    </a>
    <a class="nav-btn" href="ai-agent-welcome.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </div>

  <div class="content">
    <div class="landing">
      <div class="hero">
        <h1>Hi! I'm Your<br><span class="grad">AI Success Agent</span> 👋</h1>
        <p>Get instant answers and support 24/7</p>
      </div>

      <div class="widget-closed">
        <div class="teaser">
          <div class="greet">Hi there! 👋</div>
          <p>Need help with your digital card?</p>
          <a href="ai-agent-welcome.html" style="text-decoration: none;">
            <button class="cta">Chat with me
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </a>
        </div>
        <div class="launcher-av">
          <span class="ring"></span>
          <span class="av"><img src="ai-inka.png" alt="AI Success Agent" /></span>
          <span class="odot"></span>
          <span class="wave">👋</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
