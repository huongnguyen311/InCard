<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — AI Agent (Welcome)</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #009037;
      --green-light: #2eb07a;
      --emerald: #10b981;
      --mint: #6ee7b7;
      --green-100: #dcfce7;
      --green-50: #f0fdf6;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --slate-50: #f8fafc;
      --white: #ffffff;
      --green-glow: rgba(46,176,122,0.5);
      --grad-brand: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      --grad-header: linear-gradient(125deg, #2eb07a 0%, #009037 55%, #007a2f 100%);
      --hero-bg: linear-gradient(to bottom right, #0f172a, #111827, #000000);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100vh; margin: 0; padding: 0; }
    body {
      background: var(--hero-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.15) 0%, transparent 40%);
      animation: blobShift 15s ease-in-out infinite;
    }

    .nav-buttons {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: rgba(46,176,122,0.3);
      border-color: rgba(46,176,122,0.6);
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: 450px;
      height: auto;
      max-height: 90vh;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,30,15,0.5), 0 6px 18px rgba(0,0,0,0.28);
      animation: panel-in 0.55s cubic-bezier(0.34,1.4,0.5,1) both;
    }

    .p-header {
      position: relative;
      padding: 16px;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--grad-header);
    }

    .p-header .aurora {
      position: absolute;
      inset: -50% -20%;
      background: radial-gradient(closest-side, rgba(110,231,183,0.65), transparent 70%);
      filter: blur(14px);
      animation: aurora 9s ease-in-out infinite alternate;
      z-index: 0;
    }

    .h-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .p-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.9);
      background: var(--green-100);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.16), 0 0 16px 2px var(--green-glow);
    }

    .p-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .h-meta {
      flex: 1;
    }

    .h-meta .nm {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .h-meta .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.9);
      margin-top: 2px;
    }

    .h-meta .status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d1fae5;
    }

    .h-actions {
      display: flex;
      gap: 4px;
    }

    .h-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .h-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    .h-btn svg {
      width: 18px;
      height: 18px;
    }

    .p-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: radial-gradient(120% 45% at 50% 0%, #eafaf0 0%, rgba(234,250,240,0) 58%), var(--slate-50);
    }

    .p-body::-webkit-scrollbar {
      width: 6px;
    }

    .p-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .p-body::-webkit-scrollbar-thumb {
      background: var(--slate-200);
      border-radius: 3px;
    }

    .msg {
      max-width: 90%;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: msg-in 0.5s ease forwards;
    }

    .msg .mav {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--green-100);
    }

    .msg .mav img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bubble {
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      border-radius: 4px 16px 16px 16px;
      background: #fff;
      border: 1px solid var(--slate-200);
      color: var(--slate-800);
      box-shadow: 0 2px 10px rgba(15,23,42,0.05);
    }

    .chips {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      background: var(--slate-50);
    }

    .chip {
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-50);
      border: 1.5px solid rgba(46,176,122,0.4);
      padding: 8px 12px;
      border-radius: 999px;
      transition: all 0.2s;
    }

    .chip:hover {
      background: var(--green-100);
      transform: translateY(-1px);
    }

    .chat-input {
      flex-shrink: 0;
      background: #fff;
      border-top: 1px solid var(--slate-100);
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-input .field {
      flex: 1;
      height: 44px;
      border-radius: 999px;
      background: var(--slate-50);
      border: 1px solid var(--slate-200);
      padding: 0 16px;
      font-size: 13px;
      color: var(--slate-400);
      display: flex;
      align-items: center;
    }

    .chat-input .send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      flex-shrink: 0;
      cursor: pointer;
      background: var(--grad-brand);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0,144,55,0.3);
      transition: all 0.2s;
    }

    .chat-input .send:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 16px rgba(0,144,55,0.4);
    }

    .send svg {
      width: 18px;
      height: 18px;
    }

    .powered {
      flex-shrink: 0;
      background: #fff;
      text-align: center;
      padding: 0 0 8px;
    }

    .powered span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--slate-400);
      font-weight: 500;
    }

    .powered b {
      color: var(--slate-600);
      font-weight: 700;
    }

    @keyframes panel-in { 0% { opacity: 0; transform: scale(0.92); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes aurora { 0% { background-position: 8% 20%; } 100% { background-position: 78% 30%; } }
    @keyframes msg-in { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes blobShift { 0% { background-position: 0% 0%; } 50% { background-position: 50% 50%; } 100% { background-position: 0% 0%; } }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="nav-buttons">
    <a class="nav-btn" href="ai-agent-closed.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    </a>
    <a class="nav-btn" href="ai-agent-chat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </div>

  <div class="content">
    <div class="panel">
      <div class="p-header">
        <div class="aurora"></div>
        <div class="h-top">
          <div class="p-avatar"><img src="ai-inka.png" alt="AI Success Agent" /></div>
          <div class="h-meta">
            <div class="nm">AI Success Agent</div>
            <div class="status"><span class="dot"></span> Online · Ready to help</div>
          </div>
          <div class="h-actions">
            <button class="h-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg></button>
            <button class="h-btn"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg></button>
          </div>
        </div>
      </div>

      <div class="p-body">
        <div class="msg">
          <div class="mav"><img src="ai-inka.png" alt="" /></div>
          <div class="bubble">Hi there! 👋 I'm your AI Success Agent.<br>How can I help you today?</div>
        </div>
      </div>

      <div class="chips">
        <div class="chip">💳 How much does it cost?</div>
        <div class="chip">📊 Can I track card views?</div>
        <div class="chip">🚀 How to get started?</div>
      </div>

      <div class="chat-input">
        <div class="field">Type your message…</div>
        <button class="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
      </div>

      <div class="powered"><span><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.2L19 9l-5.4 1.8L12 16l-1.6-5.2L5 9l5.4-1.8z"/></svg> Powered by <b>InCard AI Platform</b></span></div>
    </div>
  </div>
</body>
</html>
