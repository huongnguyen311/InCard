<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — Screen Flows</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #a49d9d;
      font-family: 'Public Sans', sans-serif;
      min-height: 100vh;
      padding: 56px 40px 80px;
    }

    .title {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 240px);
      gap: 20px;
    }

    .flow-card {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
      cursor: pointer;
    }

    .flow-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 16px 48px rgba(0,0,0,0.22);
    }

    /* Preview strip — 3 mini phone thumbnails */
    .preview {
      height: 200px;
      background: rgba(0,0,0,0.08);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      overflow: hidden;
      position: relative;
    }

    .preview-phone {
      width: 68px;
      height: 148px;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      flex-shrink: 0;
      position: relative;
    }

    .preview-phone iframe {
      width: 390px;
      height: 844px;
      border: none;
      transform: scale(0.174);
      transform-origin: top left;
      pointer-events: none;
    }

    /* Staggered heights for visual depth */
    .preview-phone:nth-child(1) { height: 120px; margin-bottom: 8px; }
    .preview-phone:nth-child(2) { height: 148px; }
    .preview-phone:nth-child(3) { height: 132px; margin-bottom: 4px; }

    .card-body {
      padding: 18px 20px 20px;
    }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1.4px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .screen-count {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
    }

    .arrow {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .flow-card:hover .arrow {
      background: rgba(255,255,255,0.28);
    }
  </style>
  <link rel="stylesheet" href="button-system.css" />
  <link rel="stylesheet" href="design-system.css" />
</head>
<body>

  <div class="title">InCard — Screen Flows</div>

  <div class="grid">

    <!-- Auth Flow -->
    <a class="flow-card" href="auth.html">
      <div class="preview">
        <div class="preview-phone"><iframe src="screens/auth/01-sign-up.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/auth/03-create-profile.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/auth/05-connect-with-me.html" loading="lazy"></iframe></div>
      </div>
      <div class="card-body">
        <div class="card-label">Flow 01</div>
        <div class="card-title">InCard Auth Flow</div>
        <div class="card-meta">
          <span class="screen-count">9 screens</span>
          <span class="arrow">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6h7M6 2.5L9.5 6 6 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </div>
      </div>
    </a>

    <!-- Home & Account -->
    <a class="flow-card" href="home.html">
      <div class="preview">
        <div class="preview-phone"><iframe src="screens/home/01-home-dashboard.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/home/02-account-details.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/home/04-potential-connections.html" loading="lazy"></iframe></div>
      </div>
      <div class="card-body">
        <div class="card-label">Flow 02</div>
        <div class="card-title">InCard Home &amp; Account</div>
        <div class="card-meta">
          <span class="screen-count">8 screens</span>
          <span class="arrow">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6h7M6 2.5L9.5 6 6 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </div>
      </div>
    </a>

    <!-- Profile Flow -->
    <a class="flow-card" href="profile.html">
      <div class="preview">
        <div class="preview-phone"><iframe src="screens/profile/01-digital-profile.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/profile/12-edit-profile.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/profile/08-activation-success.html" loading="lazy"></iframe></div>
      </div>
      <div class="card-body">
        <div class="card-label">Flow 03</div>
        <div class="card-title">InCard Profile Flow</div>
        <div class="card-meta">
          <span class="screen-count">17 screens</span>
          <span class="arrow">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6h7M6 2.5L9.5 6 6 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </div>
      </div>
    </a>

    <!-- Network Flow -->
    <a class="flow-card" href="network.html">
      <div class="preview">
        <div class="preview-phone"><iframe src="screens/network/01-network.html" loading="lazy"></iframe></div>
      </div>
      <div class="card-body">
        <div class="card-label">Flow 04</div>
        <div class="card-title">InCard Network Flow</div>
        <div class="card-meta">
          <span class="screen-count">1 screen</span>
          <span class="arrow">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6h7M6 2.5L9.5 6 6 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </div>
      </div>
    </a>

    <!-- Notifications Flow -->
    <a class="flow-card" href="notifications.html">
      <div class="preview">
        <div class="preview-phone"><iframe src="screens/notifications/01-news.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/notifications/02-requested-contact.html" loading="lazy"></iframe></div>
        <div class="preview-phone"><iframe src="screens/notifications/03-others.html" loading="lazy"></iframe></div>
      </div>
      <div class="card-body">
        <div class="card-label">Flow 05</div>
        <div class="card-title">InCard Notifications</div>
        <div class="card-meta">
          <span class="screen-count">3 screens</span>
          <span class="arrow">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6h7M6 2.5L9.5 6 6 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </div>
      </div>
    </a>

  </div>

</body>
</html>
