<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — Notifications Flow</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #a49d9d; font-family: 'Public Sans', sans-serif; min-height: 100vh; padding: 48px 40px 80px; }
    .back { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.75); font-size: 12px; font-weight: 600; text-decoration: none; letter-spacing: 0.5px; margin-bottom: 32px; }
    .back:hover { color: #fff; }
    .flow-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 24px; }
    .flow-screens { display: flex; flex-direction: row; gap: 24px; align-items: flex-start; }
    .screen { display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
    .phone-frame { width: 390px; border-radius: 44px; overflow: hidden; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,0.32), 0 2px 8px rgba(0,0,0,0.16); }
    .phone-frame iframe { width: 390px; height: 844px; border: none; display: block; }
    .screen-name { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.75); text-align: center; letter-spacing: 0.3px; }
  </style>
  <script>
    function autoResize(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        iframe.style.height = doc.documentElement.scrollHeight + 'px';
      } catch(e) {}
    }
  </script>
  <link rel="stylesheet" href="button-system.css" />
  <link rel="stylesheet" href="design-system.css" />
</head>
<body>

  <a class="back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7l4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    All Flows
  </a>

  <div class="flow-label">InCard Notifications Flow</div>

  <div class="flow-screens">

    <div class="screen">
      <div class="phone-frame"><iframe src="screens/notifications/01-news.html" onload="autoResize(this)"></iframe></div>
      <div class="screen-name">Notifications — News</div>
    </div>

    <div class="screen">
      <div class="phone-frame"><iframe src="screens/notifications/02-requested-contact.html" onload="autoResize(this)"></iframe></div>
      <div class="screen-name">Notifications — Requests</div>
    </div>

    <div class="screen">
      <div class="phone-frame"><iframe src="screens/notifications/03-others.html" onload="autoResize(this)"></iframe></div>
      <div class="screen-name">Notifications — Others</div>
    </div>

  </div>

</body>
</html>
