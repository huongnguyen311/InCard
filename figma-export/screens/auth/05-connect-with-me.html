<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Connect with Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow-x: hidden; overflow-y: auto; }
    body { overflow: visible; 
      width: 390px;
    }
    body {
      background: var(--slate-50);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
    }

    .screen {
      width: 390px;
      min-height: 100vh;
      background: var(--slate-50);
      display: flex;
      flex-direction: column;
    
      border-radius: 44px;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: rgba(248,250,252,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--slate-200);
      display: flex;
      align-items: center;
      padding: 16px;
    }
    .header-back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .header-title {
      flex: 1;
      text-align: center;
      padding-right: 40px;
      font-size: 20px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.45px;
    }

    /* Content */
    .content {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 0;
    }

    /* Section label */
    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--slate-400);
      padding: 16px 12px 4px;
    }
    .section-label:first-child { padding-top: 8px; }

    /* Platform row */
    .platform-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
    }
    .platform-btn:hover { background: var(--slate-100); }

    .platform-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ig-gradient { background: var(--ig-grad); }

    .platform-name {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--slate-700);
    }

    /* Bottom Button */
    .bottom-btn {
      padding: 16px 24px 32px;
      margin-top: auto;
    }
    .btn-submit {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      font-family: 'Public Sans', sans-serif;
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">

    <!-- Header -->
    <div class="header">
      <div class="header-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="var(--slate-900)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-title">Connect with Me</div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="section-label">Social Media</div>

      <button class="platform-btn" type="button">
        <div class="platform-icon" style="background:var(--fb-blue);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" fill="white"/>
          </svg>
        </div>
        <span class="platform-name">Facebook</span>
        <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
          <path d="M1.5 1l5 5-5 5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="platform-btn" type="button">
        <div class="platform-icon ig-gradient">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="2" width="20" height="20" rx="5" stroke="white" stroke-width="1.8"/>
            <circle cx="12" cy="12" r="4.5" stroke="white" stroke-width="1.8"/>
            <circle cx="17.5" cy="6.5" r="1" fill="white"/>
          </svg>
        </div>
        <span class="platform-name">Instagram</span>
        <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
          <path d="M1.5 1l5 5-5 5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="platform-btn" type="button">
        <div class="platform-icon" style="background:var(--linkedin-blue);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" fill="white"/>
            <rect x="2" y="9" width="4" height="12" fill="white"/>
            <circle cx="4" cy="4" r="2" fill="white"/>
          </svg>
        </div>
        <span class="platform-name">LinkedIn</span>
        <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
          <path d="M1.5 1l5 5-5 5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="platform-btn" type="button">
        <div class="platform-icon" style="background:#000;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M15.75 2h-2.6L10 7.5 6.65 2H2l5.6 8.2L2.3 18H4.9l3.35-5.7L11.6 18H16.3l-5.85-8.55L15.75 2z" fill="white"/>
          </svg>
        </div>
        <span class="platform-name">Twitter (X)</span>
        <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
          <path d="M1.5 1l5 5-5 5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="platform-btn" type="button">
        <div class="platform-icon" style="background:var(--youtube-red);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.97C18.88 4 12 4 12 4s-6.88 0-8.59.45A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.97C5.12 20 12 20 12 20s6.88 0 8.59-.45a2.78 2.78 0 0 0 1.95-1.97A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="white" fill-opacity=".3"/>
            <path d="M10 15.5l5.5-3.5L10 8.5v7z" fill="white"/>
          </svg>
        </div>
        <span class="platform-name">YouTube</span>
        <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
          <path d="M1.5 1l5 5-5 5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="platform-btn" type="button">
        <div class="platform-icon" style="background:#000;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M9 12a3 3 0 1 0 6 0 3 3 0 0 0-6 0z" fill="white"/>
            <path d="M16.5 5.5c-1.5-1.5-3.5-2-5.5-1.5S7.5 6.5 7.5 8.5H5C5 5 7.5 2 11 2s7 3 7 7v1h-2v-1c0-1-.5-2.5-1.5-3.5zM7.5 18.5c1.5 1.5 3.5 2 5.5 1.5s3.5-2.5 3.5-4.5H19c0 3.5-2.5 6.5-6 6.5S7 19 7 16v-1h2v1c0 1 .5 2.5 1.5 3.5z" fill="white" fill-opacity=".7"/>
          </svg>
        </div>
        <span class="platform-name">TikTok</span>
        <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
          <path d="M1.5 1l5 5-5 5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="platform-btn" type="button">
        <div class="platform-icon" style="background:var(--figma-orange);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M8 2h4a4 4 0 0 1 0 8H8V2z" fill="white" fill-opacity=".5"/>
            <path d="M8 10h4a4 4 0 0 1 0 8H8v-8z" fill="white" fill-opacity=".7"/>
            <circle cx="16" cy="14" r="4" fill="white" fill-opacity=".9"/>
            <path d="M8 18a4 4 0 0 0 4 4v-8H8v4z" fill="white"/>
            <path d="M8 2H4a4 4 0 0 0 0 8h4V2z" fill="white" fill-opacity=".7"/>
          </svg>
        </div>
        <span class="platform-name">Figma</span>
        <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
          <path d="M1.5 1l5 5-5 5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>

    <!-- Bottom Button -->
    <div class="bottom-btn">
      <button class="btn-submit" type="button">
        Done
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4.167 10h11.666M10.833 5l5 5-5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>
</body>
</html>
