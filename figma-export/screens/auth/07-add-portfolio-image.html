<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Add Portfolio Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow-x: hidden; overflow-y: auto; }
    body { overflow: visible; 
      width: 390px;
    }
    body {
      background: var(--slate-50);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0; padding: 0;
    }

    .screen {
      width: 390px;
      min-height: 100vh;
      background: var(--slate-50);
      display: flex;
      flex-direction: column;
    
      border-radius: 44px;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: rgba(248,250,252,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--slate-200);
      display: flex;
      align-items: center;
      padding: 16px;
    }
    .header-back {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9999px; cursor: pointer; flex-shrink: 0;
    }
    .header-title {
      flex: 1; text-align: center; padding-right: 40px;
      font-size: 20px; font-weight: 700; color: var(--slate-900);
      letter-spacing: -0.45px;
    }

    /* Content */
    .content {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 24px;
      flex: 1;
    }

    /* Tabs */
    .tabs {
      background: var(--slate-100);
      border-radius: 12px;
      padding: 4px;
      display: flex;
    }
    .tab {
      flex: 1; padding: 8px; text-align: center;
      font-size: 14px; font-weight: 600;
      border-radius: 8px; cursor: pointer;
      border: none; background: none;
      font-family: 'Public Sans', sans-serif;
      color: var(--slate-500);
    }
    .tab.active {
      background: var(--white);
      color: var(--green);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    /* Fields */
    .field-hint { font-size: 12px; font-weight: 400; color: var(--slate-400); }
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-lbl { font-size: 14px; font-weight: 700; color: var(--slate-700); }

    /* Upload area */
    .upload-area {
      background: var(--white);
      border: 2px dashed var(--input-border);
      border-radius: 16px;
      padding: 34px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      cursor: pointer;
    }
    .upload-area span { font-size: 14px; color: var(--slate-500); }

    /* Input */
    .input-wrapper { position: relative; }
    .input-wrapper input {
      width: 100%; height: 56px;
      background: var(--white);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 0 44px;
      font-size: 16px; font-family: 'Public Sans', sans-serif;
      color: var(--slate-600); outline: none;
    }
    .input-wrapper input::placeholder { color: var(--slate-400); }
    .input-icon-left {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Textarea */
    .field-textarea {
      width: 100%; background: var(--white);
      border: 1px solid var(--input-border);
      border-radius: 12px; padding: 14px 16px;
      font-size: 16px; font-family: 'Public Sans', sans-serif;
      color: var(--slate-600); outline: none;
      min-height: 100px; resize: none; line-height: 1.5;
    }
    .field-textarea::placeholder { color: var(--slate-400); }

    /* Bottom Button */
    .bottom-btn { padding: 0 24px 32px; }
    .btn-submit {
      font-size: 16px; font-weight: 700; color: var(--white);
      font-family: 'Public Sans', sans-serif;
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">

    <!-- Header -->
    <div class="header">
      <div class="header-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="var(--slate-900)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-title">Add Portfolio</div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab" type="button">Video</button>
        <button class="tab active" type="button">Images</button>
      </div>

      <div class="field-hint">Max 4 images</div>

      <!-- Upload Images -->
      <div class="field-group">
        <div class="field-lbl">Upload Images</div>
        <div class="upload-area">
          <svg width="30" height="38" viewBox="0 0 30 38" fill="none">
            <rect x="1" y="5" width="22" height="26" rx="3" stroke="var(--slate-400)" stroke-width="1.5"/>
            <rect x="7" y="1" width="22" height="26" rx="3" fill="var(--slate-100)" stroke="var(--slate-300)" stroke-width="1.5"/>
            <path d="M15 11v8M11 15l4-4 4 4" stroke="var(--slate-400)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M11 23h8" stroke="var(--slate-400)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span>Select Files</span>
        </div>
      </div>

      <!-- Title -->
      <div class="field-group">
        <label class="field-lbl" for="img-title">Title</label>
        <div class="input-wrapper">
          <div class="input-icon-left">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M4 6h12M4 10h8M4 14h6" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <input type="text" id="img-title" placeholder="Enter a title for this portfolio" />
        </div>
      </div>

      <!-- Description -->
      <div class="field-group">
        <label class="field-lbl" for="img-desc">Description</label>
        <textarea class="field-textarea" id="img-desc" placeholder="Briefly describe these images..."></textarea>
      </div>

    </div>

    <!-- Bottom Button -->
    <div class="bottom-btn">
      <button class="btn-submit" type="button">
        Save
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4.167 10h11.666M10.833 5l5 5-5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>
</body>
</html>
