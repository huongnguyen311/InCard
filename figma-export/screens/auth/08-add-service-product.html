<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Add Service / Product Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow-x: hidden; overflow-y: auto; }
    body { overflow: visible; 
      width: 390px;
    }
    body {
      background: var(--slate-50);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0; padding: 0;
    }

    .screen {
      width: 390px;
      min-height: 100vh;
      background: var(--slate-50);
      display: flex;
      flex-direction: column;
    
      border-radius: 44px;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: rgba(248,250,252,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--slate-200);
      display: flex;
      align-items: center;
      padding: 16px;
    }
    .header-back {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9999px; cursor: pointer; flex-shrink: 0;
    }
    .header-title {
      flex: 1; text-align: center; padding-right: 40px;
      font-size: 20px; font-weight: 700; color: var(--slate-900);
      letter-spacing: -0.45px;
    }

    /* Content */
    .content {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px;
      flex: 1;
    }

    /* Upload section */
    .upload-section {
      background: var(--white);
      border: 2px dashed var(--input-border);
      border-radius: 12px;
      padding: 24px;
    }
    .upload-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .upload-icon-wrap {
      width: 42px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .upload-text { flex: 1; }
    .upload-text-title {
      font-size: 14px; font-weight: 700;
      color: var(--slate-900); line-height: 1.25;
    }
    .upload-text-sub {
      font-size: 12px; color: var(--slate-500); margin-top: 2px;
    }
    .upload-btn {
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%); border: none;
      border-radius: 8px; padding: 0 16px; height: 36px;
      font-size: 12px; font-weight: 700; color: var(--white);
      font-family: 'Public Sans', sans-serif; cursor: pointer;
    }

    /* Fields */
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-lbl { font-size: 14px; font-weight: 700; color: var(--slate-700); }

    .input-wrapper { position: relative; }
    .input-wrapper input {
      width: 100%; height: 56px;
      background: var(--white);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 0 44px;
      font-size: 16px; font-family: 'Public Sans', sans-serif;
      color: var(--slate-600); outline: none;
    }
    .input-wrapper input::placeholder { color: var(--slate-400); }
    .input-icon-left {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    .field-textarea {
      width: 100%; background: var(--white);
      border: 1px solid var(--input-border);
      border-radius: 12px; padding: 14px 16px;
      font-size: 16px; font-family: 'Public Sans', sans-serif;
      color: var(--slate-600); outline: none;
      height: 120px; resize: none; line-height: 1.5;
    }
    .field-textarea::placeholder { color: var(--slate-400); }

    /* Bottom Button */
    .bottom-btn { padding: 0 24px 32px; }
    .btn-submit {
      font-size: 16px; font-weight: 700; color: var(--white);
      font-family: 'Public Sans', sans-serif;
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">

    <!-- Header -->
    <div class="header">
      <div class="header-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="var(--slate-900)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-title">Add Service / Product Gallery</div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Image Upload -->
      <div class="upload-section">
        <div class="upload-row">
          <div class="upload-icon-wrap">
            <svg width="42" height="40" viewBox="0 0 42 40" fill="none">
              <rect x="1" y="1" width="32" height="32" rx="6" fill="var(--green-bg)" stroke="rgba(0,144,55,0.2)" stroke-width="1.5"/>
              <circle cx="15" cy="13" r="3" stroke="var(--green)" stroke-width="1.5"/>
              <path d="M1 25l8-8 6 6 4-4 8 8" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="33" cy="29" r="8" fill="var(--green)"/>
              <path d="M33 25v8M29 29h8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="upload-text">
            <div class="upload-text-title">Upload Images</div>
            <div class="upload-text-sub">Up to 3 photos</div>
          </div>
          <button class="upload-btn" type="button">Upload</button>
        </div>
      </div>

      <!-- Name -->
      <div class="field-group">
        <label class="field-lbl" for="product-name">Service / Product Name</label>
        <div class="input-wrapper">
          <div class="input-icon-left">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M4 6h12M4 10h8M4 14h6" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <input type="text" id="product-name" placeholder="Enter name" />
        </div>
      </div>

      <!-- Link -->
      <div class="field-group">
        <label class="field-lbl" for="product-link">Service / Product Link</label>
        <div class="input-wrapper">
          <div class="input-icon-left">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M8.5 11.5a4.5 4.5 0 0 0 6.364 0l2-2a4.5 4.5 0 0 0-6.364-6.364l-1.5 1.5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11.5 8.5a4.5 4.5 0 0 0-6.364 0l-2 2a4.5 4.5 0 0 0 6.364 6.364l1.5-1.5" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <input type="url" id="product-link" placeholder="https://" />
        </div>
      </div>

      <!-- Description -->
      <div class="field-group">
        <label class="field-lbl" for="product-desc">Description</label>
        <textarea class="field-textarea" id="product-desc" placeholder="Write a short description of what you offer..."></textarea>
      </div>

    </div>

    <!-- Bottom Button -->
    <div class="bottom-btn">
      <button class="btn-submit" type="button">
        Save
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4.167 10h11.666M10.833 5l5 5-5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>
</body>
</html>
