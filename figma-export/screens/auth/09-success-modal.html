<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Product Saved</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow-x: hidden; overflow-y: auto; }
    body { overflow: visible; 
      width: 390px;
    }
    body {
      background: var(--slate-50);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0; padding: 0;
    }

    .screen {
      width: 390px;
      min-height: 100vh;
      background: var(--slate-50);
      display: flex;
      flex-direction: column;
    
      border-radius: 44px;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: rgba(248,250,252,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--slate-200);
      display: flex;
      align-items: center;
      padding: 16px;
    }
    .header-back {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9999px; cursor: pointer; flex-shrink: 0;
    }
    .header-title {
      flex: 1; text-align: center; padding-right: 40px;
      font-size: 20px; font-weight: 700; color: var(--slate-900);
      letter-spacing: -0.45px;
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 16px;
    }

    /* Success Icon */
    .success-icon-wrap {
      position: relative;
      margin-bottom: 8px;
    }
    .success-icon-bg {
      width: 96px;
      height: 96px;
      background: var(--green-bg);
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 28px;
      height: 28px;
      background: var(--green-light);
      border: 4px solid var(--slate-50);
      border-radius: 9999px;
    }

    /* Text */
    .success-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 1.4px;
      text-transform: uppercase;
      text-align: center;
    }
    .success-heading {
      font-size: 24px;
      font-weight: 700;
      color: var(--slate-900);
      text-align: center;
      line-height: 1.33;
    }
    .success-body {
      font-size: 14px;
      font-weight: 400;
      color: var(--slate-500);
      text-align: center;
      line-height: 1.625;
      max-width: 300px;
    }

    /* Bottom Button */
    .bottom-btn { padding: 0 24px 32px; }
    .btn-submit {
      font-size: 16px; font-weight: 700; color: var(--white);
      font-family: 'Public Sans', sans-serif;
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">

    <!-- Header -->
    <div class="header">
      <div class="header-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="var(--slate-900)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-title">Product Saved</div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Success Icon -->
      <div class="success-icon-wrap">
        <div class="success-icon-bg">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="var(--green)" stroke-width="2.5"/>
            <path d="M14 24l7 7 13-13" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="success-badge"></div>
      </div>

      <div class="success-label">Success</div>

      <div class="success-heading">Product saved<br>successfully!</div>

      <div class="success-body">Your new service has been added to the catalog and is now visible to your clients in your digital storefront.</div>

    </div>

    <!-- Bottom Button -->
    <div class="bottom-btn">
      <button class="btn-submit" type="button">
        Done
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4.167 10h11.666M10.833 5l5 5-5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>
</body>
</html>
