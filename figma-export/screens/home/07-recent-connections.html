<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Recent Connections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow-x: hidden; overflow-y: auto; }
    body { overflow: visible; 
      width: 390px;
    }
    body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
    }
    .screen {
      width: 390px;
      background: var(--gray-bg);
      min-height: 844px;
      display: flex;
      flex-direction: column;
    
      border-radius: 44px;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--slate-200);
      padding-bottom: 17px;
      position: sticky; top: 0; z-index: 2;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 0; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
    .back-btn svg { width: 16px; height: 16px; }
    .header-title { font-size: 22px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.5px; }
    .search-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .search-btn svg { width: 18px; height: 18px; }
    .search-bar { margin: 8px 16px 0; position: relative; }
    .search-bar input {
      width: 100%; background: var(--slate-100); border: none; border-radius: 12px;
      padding: 12px 16px 12px 40px;
      font-family: 'Public Sans', sans-serif; font-size: 14px; color: var(--slate-400);
      outline: none;
    }
    .search-bar input::placeholder { color: var(--slate-400); }
    .search-icon { position: absolute; left: 15px; top: 11px; }
    .search-icon svg { width: 18px; height: 18px; }

    /* Connection list */
    .conn-list { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .conn-item {
      display: flex; align-items: center; gap: 16px;
      padding: 12px; border-radius: 16px;
    }
    .conn-avatar {
      width: 56px; height: 56px; border-radius: 9999px;
      border: 2px solid var(--white);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      overflow: hidden; flex-shrink: 0;
      background: var(--slate-200);
    }
    .conn-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conn-info { flex: 1; overflow: hidden; }
    .conn-name { font-size: 16px; font-weight: 700; color: var(--slate-900); line-height: 1.5; }
    .conn-role { font-size: 14px; color: var(--slate-500); line-height: 1.43; }
    .conn-company { font-size: 12px; font-weight: 500; color: var(--green); line-height: 1.33; }
    .conn-action {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--slate-100);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .conn-action svg { width: 18px; height: 18px; }
    .conn-action.chat { /* green chat icon */ }
    .conn-action svg.chat-icon path { fill: var(--green); }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
      position: relative;
    }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">

      <!-- Item 5: chat -->
      <div class="conn-item">

        </div>
        <div class="conn-action">
          <svg viewBox="0 0 18 18" fill="none">
            <path d="M16 1H2C1.45 1 1 1.45 1 2v11c0 .55.45 1 1 1h2v3l3.6-3H16c.55 0 1-.45 1-1V2c0-.55-.45-1-1-1z" fill="var(--green)"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Spacer -->
    <div style="flex:1"></div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-link">
    <div class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-4v-7H8v7H5a1 1 0 01-1-1V9.5z" fill="var(--green)"/></svg>
