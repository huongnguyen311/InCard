<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Connection Request Sent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow-x: hidden; overflow-y: auto; }
    body { overflow: visible; 
      width: 390px;
    }
    body {
      background: var(--slate-200);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
    }
    .screen {
      width: 390px;
      background: var(--slate-200);
      min-height: 844px;
      position: relative;
    
      border-radius: 44px;
      overflow: hidden;
    }

    /* Background content (blurred, represents previous screen) */
    .bg-content {
      position: absolute;
      inset: 0;
      background: var(--gray-bg);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 48px;
      opacity: 0.2;
    }
    .bg-header { display: flex; align-items: center; justify-content: space-between; }
    .bg-title { background: #cbd5e1; height: 32px; border-radius: 4px; width: 128px; }
    .bg-icons { display: flex; gap: 16px; }
    .bg-circle { background: #cbd5e1; width: 40px; height: 40px; border-radius: 9999px; }
    .bg-cards { display: flex; flex-direction: column; gap: 24px; }
    .bg-card { background: #cbd5e1; aspect-ratio: 16/9; border-radius: 12px; }

    /* Overlay backdrop */
    .modal-overlay {
      position: absolute;
      left: 0; right: 0; top: 0;
      bottom: 140px;
      background: var(--overlay-bg);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* Modal */
    .modal {
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }
    .modal-body {
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .success-icon-wrap {
      width: 56px; height: 56px; border-radius: 9999px;
      background: var(--green-bg);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .success-icon-wrap svg { width: 22px; height: 17px; }
    .modal-title {
      font-size: 22px; font-weight: 600;
      color: var(--slate-900); text-align: center; line-height: 1.25;
      margin-bottom: 8px;
    }
    .modal-body-text {
      font-size: 16px; color: var(--slate-500);
      text-align: center; line-height: 1.625;
      margin-bottom: 32px;
    }
    .modal-body-text strong { font-weight: 500; color: var(--slate-800); }
    .done-btn {
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      color: var(--white);
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.35px;
      height: 48px;
      border-radius: 12px;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,144,55,0.2), 0 2px 4px -2px rgba(0,144,55,0.2);
    }
    .modal-bottom-bar {
      height: 4px;
      background: rgba(0,144,55,0.05);
    }

    /* Bottom white sheet (visible below modal, simulates bottom nav area) */
    .bottom-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 140px;
      background: var(--slate-100);
      border-radius: 0;
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">
    <!-- Background -->
    <div class="bg-content">
      <div class="bg-header">
        <div class="bg-title"></div>
        <div class="bg-icons">
          <div class="bg-circle"></div>
          <div class="bg-circle"></div>
        </div>
      </div>
      <div class="bg-cards">
        <div class="bg-card"></div>
        <div class="bg-card"></div>
        <div class="bg-card"></div>
      </div>
    </div>

    <!-- Bottom sheet area -->
    <div class="bottom-sheet"></div>

    <!-- Modal overlay -->
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-body">
          <div class="success-icon-wrap">
            <svg viewBox="0 0 22 17" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 8.5L7.5 15L21 1" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="modal-title">Request Sent</div>
          <div class="modal-body-text">
            Your connection request has been sent to <strong>Marcus Thorne</strong>. You will be notified once they accept.
          </div>
          <div class="done-btn">Done</div>
        </div>
        <div class="modal-bottom-bar"></div>
      </div>
    </div>
  </div>
</body>
</html>
