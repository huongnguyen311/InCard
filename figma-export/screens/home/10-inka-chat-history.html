<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — Inka Chat History</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green:          #009037;
      --green-light:    #2eb07a;
      --bg:             #f8f6f6;
      --bg-2:           #f1f5f9;
      --surface:        #ffffff;
      --border:         rgba(0,0,0,0.07);
      --border-strong:  #e2e8f0;
      --text-primary:   #0f172a;
      --text-secondary: #475569;
      --text-muted:     #94a3b8;
      --red-600:        #dc2626;
      --white:          #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; height: 100%; overflow: hidden; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

    body {
      font-family: 'DM Sans', sans-serif;
      width: 390px; height: 844px;
      background: var(--bg);
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 280px; height: 160px;
      background: radial-gradient(ellipse, rgba(0,144,55,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    .header {
      position: relative; z-index: 2;
      padding: 20px 20px 16px;
      display: flex; align-items: center; gap: 12px;
      background: rgba(248,246,246,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border-strong);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .header-identity {
      flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0;
    }

    .inka-avatar {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #007a2f 0%, #2eb07a 100%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(0,144,55,0.4), 0 4px 12px rgba(0,144,55,0.35);
      position: relative;
    }
    .inka-avatar::after {
      content: ''; position: absolute; inset: -3px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(0,144,55,0.3), transparent 60%);
      z-index: -1;
    }

    .header-name {
      font-family: 'Public Sans', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--text-primary);
    }

    /* ── List ── */
    .list {
      flex: 1; overflow-y: auto;
      padding: 8px 0 24px;
      position: relative; z-index: 1;
    }
    .list::-webkit-scrollbar { display: none; }

    .group-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.6px; text-transform: uppercase;
      padding: 16px 20px 8px;
    }

    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px;
      cursor: pointer; position: relative;
      transition: background 0.12s;
    }
    .history-item:hover { background: rgba(0,0,0,0.03); }
    .history-item.active { background: rgba(0,144,55,0.04); }

    .item-icon {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .item-title {
      flex: 1; font-size: 14px; font-weight: 500; color: var(--text-primary);
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .item-date {
      font-size: 11px; font-weight: 400; color: var(--text-muted);
      flex-shrink: 0; margin-right: 4px;
    }

    .more-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .more-btn:hover { background: var(--bg-2); color: var(--text-primary); }

    /* Context menu */
    .ctx-menu {
      position: absolute; right: 52px; top: 6px;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--border-strong);
      overflow: hidden; z-index: 10; min-width: 164px;
    }
    .ctx-item {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--text-primary);
      cursor: pointer; transition: background 0.1s;
    }
    .ctx-item:not(:last-child) { border-bottom: 1px solid var(--border-strong); }
    .ctx-item:hover { background: var(--bg-2); }
    .ctx-item.danger { color: var(--red-600); }

    /* ── Home indicator ── */
    .home-indicator {
      height: 28px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .home-bar { width: 110px; height: 4px; border-radius: 9999px; background: rgba(0,0,0,0.15); }
  </style>
</head>
