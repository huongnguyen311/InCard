<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Discover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow-x: hidden; }
    body {
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px;
      background: var(--bg);
      padding-bottom: 88px;
    }

    /* ── HEADER ── */
    .header {
      background: rgba(249,248,247,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
      padding: 20px 20px 0;
      position: sticky; top: 0; z-index: 50;
      flex-shrink: 0;
    }
    .header-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .back-btn {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--white); border: 1px solid var(--slate-200);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .header-title {
      font-family: 'Public Sans', sans-serif;
      font-size: 16px; font-weight: 700;
      color: var(--ink);
      flex: 1;
    }

    /* tabs — pill style */
    .tabs {
      display: flex; gap: 0;
      padding: 0 0 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tabs-inner {
      display: flex;
      background: var(--slate-100);
      border-radius: 12px;
      padding: 3px;
      gap: 2px;
      margin-bottom: 12px;
      width: 100%;
    }
    .tab {
      flex: 1;
      padding: 8px 4px;
      font-size: 13px; font-weight: 600;
      color: var(--slate-500);
      cursor: pointer;
      border-radius: 10px;
      text-align: center;
      border: none; background: none;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--white);
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ── FEED ── */
    .feed {
      display: flex; flex-direction: column;
      padding: 0;
    }

    /* ── HERO CARD (first article) ── */
    .card-hero {
      position: relative; overflow: hidden;
      background: var(--ink);
      cursor: pointer;
    }
    .card-hero-img {
      width: 100%; height: 240px;
      object-fit: cover; display: block;
      opacity: 0.7;
      transition: opacity 0.3s, transform 0.4s;
    }
    .card-hero:hover .card-hero-img {
      opacity: 0.6; transform: scale(1.02);
    }
    .card-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 30%, rgba(13,17,23,0.92) 100%);
    }
    .card-hero-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 18px 20px;
    }
    .card-tag {
      display: inline-block;
      font-size: 10px; font-weight: 800;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: 8px;
    }
    .card-hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px; font-weight: 400; line-height: 1.35;
      color: var(--white);
      margin-bottom: 12px;
    }
    .card-byline {
      display: flex; align-items: center; gap: 8px;
    }
    .byline-avatar {
      width: 24px; height: 24px; border-radius: 9999px;
      overflow: hidden; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: var(--slate-100);
    }
    .byline-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .byline-text {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.65);
    }
    .byline-dot {
      width: 2px; height: 2px; border-radius: 9999px;
      background: rgba(255,255,255,0.3); flex-shrink: 0;
    }
    .byline-time {
      font-size: 11px; color: rgba(255,255,255,0.45);
    }
    .hero-like {
      position: absolute; top: 12px; right: 14px;
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      border-radius: 20px; padding: 5px 10px;
    }
    .hero-like-count { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px 12px;
      background: var(--bg);
    }
    .section-divider-label {
      font-size: 10px; font-weight: 800; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--slate-400);
      white-space: nowrap;
    }
    .section-divider-line {
      flex: 1; height: 1px; background: var(--rule);
    }

    /* ── STANDARD CARD ── */
    .card {
      background: var(--white);
      margin: 0 16px 12px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--rule);
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    /* grid image */
    .card-img-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 120px 100px;
      gap: 2px;
    }
    .card-img-grid .g-main {
      grid-column: 1 / 3; grid-row: 1;
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .card-img-grid .g-sub {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* single image */
    .card-img-single {
      width: 100%; height: 170px; object-fit: cover; display: block;
    }

    .card-body {
      padding: 14px 14px 13px;
    }
    .card-tag-inline {
      font-size: 10px; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase; color: var(--green);
      margin-bottom: 6px; display: block;
    }
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 16px; font-weight: 400; line-height: 1.4;
      color: var(--ink); margin-bottom: 11px;
    }
    .card-meta {
      display: flex; align-items: center; gap: 8px;
      border-top: 1px solid var(--rule); padding-top: 10px;
    }
    .meta-avatar {
      width: 26px; height: 26px; border-radius: 9999px;
      overflow: hidden; flex-shrink: 0;
      background: var(--slate-100);
      border: 1px solid var(--slate-200);
    }
    .meta-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .meta-source { font-size: 12px; font-weight: 700; color: var(--ink-mid); }
    .meta-sep { font-size: 10px; color: var(--slate-400); }
    .meta-date { font-size: 11px; color: var(--slate-400); flex: 1; }
    .meta-like {
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .meta-like-count { font-size: 12px; color: var(--slate-400); font-weight: 500; }

    /* ── COMPACT ROW CARD ── */
    .card-row {
      background: var(--white);
      margin: 0 16px 12px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--rule);
      display: flex; align-items: stretch;
      gap: 0; cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .card-row:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .card-row-img {
      width: 100px; height: 92px;
      object-fit: cover; flex-shrink: 0;
    }
    .card-row-body {
      flex: 1; padding: 10px 12px;
      display: flex; flex-direction: column; justify-content: space-between;
      min-width: 0;
    }
    .card-row-tag {
      font-size: 9px; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase; color: var(--green);
    }
    .card-row-title {
      font-size: 13px; font-weight: 600; color: var(--ink);
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-row-meta {
      font-size: 11px; color: var(--slate-400);
    }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 92px; right: 20px;
      width: 50px; height: 50px; border-radius: 9999px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0, 144, 55, 0.35);
      z-index: 50; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .fab:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 24px rgba(0,144,55,0.5);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
      position: relative;
    }
    .nav-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }

    /* staggered fade-in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-hero  { animation: fadeUp 0.35s ease both; }
    .card       { animation: fadeUp 0.35s ease both; }
    .card-row   { animation: fadeUp 0.35s ease both; }
    .card:nth-child(1)    { animation-delay: 0.05s; }
    .card:nth-child(2)    { animation-delay: 0.12s; }
    .card-row:nth-child(1){ animation-delay: 0.18s; }
    .card-row:nth-child(2){ animation-delay: 0.24s; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <button class="back-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="var(--slate-600)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="header-title">Discover</div>
    </div>
    <div class="tabs">
      <div class="tabs-inner">
        <button class="tab active">News</button>
        <button class="tab">Timeline</button>
        <button class="tab">My Feeds</button>
      </div>
    </div>
  </div>

  <!-- Feed -->
  <div class="feed">

    <!-- Grid image card -->
    <div class="card">
      <div class="card-img-grid">
        <img class="g-main"
          src="https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?w=800&q=80"
          alt="FDI"
          onerror="this.style.background='#e0f2fe';this.removeAttribute('src')" />
        <img class="g-sub"
          src="https://images.unsplash.com/photo-1565688534245-05d6b5be184a?w=400&q=80"
          alt="Factory"
          onerror="this.style.background='#dcfce7';this.removeAttribute('src')" />
        <img class="g-sub"
          src="https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=400&q=80"
          alt="Manufacturing"
          onerror="this.style.background='#fef9c3';this.removeAttribute('src')" />
      </div>
      <div class="card-body">
        <div class="card-title">Vietnam rises to third most attractive investment destination for regional CEOs</div>
        <div class="card-meta">
          <div class="meta-avatar">
            <img src="https://www.figma.com/api/mcp/asset/7f0a3d58-f11d-4bee-b0f6-683c3bc7c81a" alt="InCard" />
          </div>
          <span class="meta-source">Incard</span>
          <span class="meta-sep">·</span>
          <span class="meta-date">March 17</span>
          <div class="meta-like">
            <span class="meta-like-count">4</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="var(--slate-400)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Single image card -->
    <div class="card">
      <img class="card-img-single"
        src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=800&q=80"
        alt="AI Networking"
        onerror="this.style.background='#f1f5f9';this.style.height='140px';this.removeAttribute('src')" />
      <div class="card-body">
        <div class="card-title">How AI is reshaping professional networking in Southeast Asia</div>
        <div class="card-meta">
          <div class="meta-avatar">
            <img src="https://www.figma.com/api/mcp/asset/982c54bf-f358-4815-b6c0-c09a0e011915" alt="Sarah" />
          </div>
          <span class="meta-source">Sarah Chen</span>
          <span class="meta-sep">·</span>
          <span class="meta-date">March 16</span>
          <div class="meta-like">
            <span class="meta-like-count">12</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" fill="var(--green)" stroke="var(--green)" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /feed -->

  <!-- FAB — Add new post -->
  <div class="fab" style="display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:24px; width:auto; padding:0 16px; height:50px;">
    <div style="display:flex; align-items:center; gap:7px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      <span style="font-family:'Public Sans',sans-serif; font-size:13px; font-weight:700; color:#fff; white-space:nowrap;">New Post</span>
    </div>
  </div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-link">
    <div class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 21v-8h6v8" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="nav-label">Home</span>
    <span class="nav-dot"></span>
  </div>
  <div class="nav-link">
    <div class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="7" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="17" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M7.5 12h5.5M13 12l3.5-4M13 12l3.5 4" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="nav-label">Network</span>
    <span class="nav-dot"></span>
  </div>
  <div class="nav-fab-wrap">
    <div class="nav-fab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="15.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="14" y="18" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="18" width="3" height="3" rx="0.5" fill="white"/></svg>
    </div>
  </div>
  <div class="nav-link">
    <div class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="var(--green)" fill-opacity="0.12" stroke="var(--green)" stroke-width="1.75"/><path d="M16.5 7.5l-3 6-5.5 2.5 3-6 5.5-2.5z" fill="var(--green)" stroke="var(--green)" stroke-width="0.5" stroke-linejoin="round"/></svg>
    </div>
    <span class="nav-label active">Explore</span>
    <span class="nav-dot"></span>
  </div>
  <div class="nav-link">
    <div class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round"/></svg>
    </div>
    <span class="nav-label">Profile</span>
    <span class="nav-dot"></span>
  </div>
</div>

</body>
</html>
