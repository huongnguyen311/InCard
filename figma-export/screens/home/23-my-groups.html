<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — My Groups</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green:         #009037;
      --green-dark:    #007a2f;
      --green-light:   #2eb07a;
      --green-bg:      rgba(0,144,55,0.08);
      --green-border:  rgba(0,144,55,0.18);
      --green-surface: #dcfce7;
      --slate-900:     #0f172a;
      --slate-800:     #1e293b;
      --slate-700:     #334155;
      --slate-600:     #475569;
      --slate-500:     #64748b;
      --slate-400:     #94a3b8;
      --slate-300:     #cbd5e1;
      --slate-200:     #e2e8f0;
      --slate-100:     #f1f5f9;
      --slate-50:      #f8fafc;
      --gray-bg:       #f4f4f5;
      --white:         #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

    body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      width: 390px;
      min-height: 100vh;
      padding-bottom: 96px;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0; z-index: 10;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--slate-200);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 12px;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--slate-200); }
    .header-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.3px;
    }
    .header-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--white);
      background: var(--green);
      border-radius: 20px;
      padding: 3px 10px;
      flex-shrink: 0;
    }

    /* ── SCROLL BODY ── */
    .scroll-body {
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── GROUP CARD ── */
    .group-card {
      background: var(--white);
      border-radius: 20px;
      border: 1px solid var(--slate-200);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .group-card:hover {
      border-color: var(--green-border);
      box-shadow: 0 2px 12px rgba(0,144,55,0.08), 0 1px 3px rgba(0,0,0,0.05);
    }

    /* Group icon */
    .group-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      position: relative;
      overflow: hidden;
    }
    .group-icon.color-1 {
      background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
      color: var(--green-dark);
    }
    .group-icon.color-2 {
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      color: #1d4ed8;
    }
    .group-icon.color-3 {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      color: #92400e;
    }
    .group-icon.color-4 {
      background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
      color: #9d174d;
    }
    .group-icon.color-5 {
      background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
      color: #5b21b6;
    }

    /* Group info */
    .group-info {
      flex: 1;
      min-width: 0;
    }
    .group-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.2px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .group-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
    }
    .group-member-count {
      font-size: 12px;
      color: var(--slate-500);
      line-height: 1.4;
    }
    .group-dot {
      width: 3px; height: 3px;
      border-radius: 9999px;
      background: var(--slate-300);
      flex-shrink: 0;
    }
    .group-type {
      font-size: 11px;
      font-weight: 600;
      color: var(--slate-400);
    }

    /* Member avatar stack */
    .member-stack {
      display: flex;
      align-items: center;
      margin-top: 8px;
    }
    .member-pip {
      width: 20px; height: 20px;
      border-radius: 9999px;
      border: 2px solid var(--white);
      overflow: hidden;
      margin-left: -6px;
      background: var(--slate-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; font-weight: 700; color: var(--slate-500);
      flex-shrink: 0;
    }
    .member-pip:first-child { margin-left: 0; }
    .member-pip img { width: 100%; height: 100%; object-fit: cover; }
    .member-pip-more {
      font-size: 7px;
      font-weight: 800;
      color: var(--slate-500);
      background: var(--slate-100);
    }

    /* View button */
    .view-btn {
      height: 34px;
      padding: 0 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      background: var(--green-bg);
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .view-btn:hover { background: rgba(0,144,55,0.14); }
    .view-btn:active { transform: scale(0.96); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--slate-400);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 4px;
      margin-top: 8px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 32px;
      text-align: center;
    }
    .empty-icon-wrap {
      width: 72px; height: 72px;
      border-radius: 22px;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .empty-title {
      font-size: 16px; font-weight: 700;
      color: var(--slate-800);
      margin-bottom: 8px;
    }
    .empty-sub {
      font-size: 13px;
      color: var(--slate-500);
      line-height: 1.6;
      max-width: 240px;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
    }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="var(--slate-700)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-title">My Groups</div>
    <div class="header-badge">5</div>
  </div>

  <!-- Scroll Body -->
  <div class="scroll-body">

    <div class="section-label">Joined</div>

    <!-- Group 1 -->
    <div class="group-card">
      <div class="group-icon color-1">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="#007a2f" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="7" r="4" stroke="#007a2f" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="#007a2f" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>

        </svg>
      </button>
    </div>

    <!-- Group 2 -->
    <div class="group-card">
      <div class="group-icon color-2">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="20" height="14" rx="2" stroke="#1d4ed8" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 21h8M12 17v4" stroke="#1d4ed8" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="group-info">
        <div class="group-name">Startup Founders HCM</div>
        <div class="group-meta">

      </div>
      <button class="view-btn">
        View

    </div>

    <!-- Group 3 -->
    <div class="group-card">
      <div class="group-icon color-3">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#92400e" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>

        </svg>
      </div>
      <div class="group-info">
        <div class="group-name">Hội Thiết Kế Sáng Tạo</div>
        <div class="group-meta">
          <span class="group-member-count">132 members</span>
        </div>
      </div>
      <button class="view-btn">
        View
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M9 18l6-6-6-6" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="section-label" style="margin-top: 16px;">Managing</div>

    <!-- Group 4 -->
    <div class="group-card">
      <div class="group-icon color-4">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="#9d174d" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="group-info">
        <div class="group-name">Network Marketing Pro</div>
        <div class="group-meta">
          <span class="group-member-count">57 members</span>
        </div>
      </div>
      <button class="view-btn">
        View
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M9 18l6-6-6-6" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Group 5 -->
    <div class="group-card">
      <div class="group-icon color-5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#5b21b6" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 8v4l3 3" stroke="#5b21b6" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="group-info">
        <div class="group-name">Fintech Vietnam 2025</div>
        <div class="group-meta">
          <span class="group-member-count">19 members</span>
        </div>
      </div>
      <button class="view-btn">
        View
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M9 18l6-6-6-6" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div><!-- /scroll-body -->

  <!-- Bottom Nav — Home active -->
  <div class="bottom-nav">
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-4v-7H8v7H5a1 1 0 01-1-1V9.5z" fill="var(--green)"/></svg>
      </div>
      <span class="nav-label active">Home</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="7" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="17" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M7.5 12h5.5M13 12l3.5-4M13 12l3.5 4" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="nav-label">Network</span>

    <div class="nav-fab-wrap">
      <div class="nav-fab">

      </div>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M16.5 7.5l-3 6-5.5 2.5 3-6 5.5-2.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="1" fill="var(--slate-400)"/></svg>
      </div>
      <span class="nav-label">Explore</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round"/></svg>
      </div>
      <span class="nav-label">Profile</span>
      <span class="nav-dot"></span>
    </div>
  </div>

</body>
</html>
