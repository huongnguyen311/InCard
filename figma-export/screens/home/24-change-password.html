<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow: hidden; }
body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px;
      min-height: 100vh;
      padding-bottom: 96px;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0; z-index: 10;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--slate-200);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--slate-200); }
    .header-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.3px;
    }

    /* ── FORM BODY ── */
    .form-body {
      padding: 28px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── FIELD GROUP ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .field-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--slate-700);
      letter-spacing: 0.1px;
    }
    .field-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .field-input {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: 1.5px solid var(--slate-200);
      background: var(--white);
      padding: 0 48px 0 16px;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--slate-900);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      letter-spacing: 0.5px;
    }
    .field-input::placeholder {
      color: var(--slate-400);
      font-weight: 400;
      letter-spacing: 0;
    }
    .field-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,144,55,0.1);
    }
    .toggle-btn {
      position: absolute;
      right: 14px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--slate-400);
      border: none;
      background: none;
      padding: 0;
      transition: color 0.15s;
    }
    .toggle-btn:hover { color: var(--slate-600); }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--slate-200);
      margin: 4px 0;
    }

    /* ── CTA ── */
    .cta-wrap {
      padding: 24px 20px 0;
    }
    .btn-update {
      width: 100%;
      height: 54px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      box-shadow: 0 4px 14px rgba(0,144,55,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: box-shadow 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }
    .btn-update:hover {
      box-shadow: 0 6px 20px rgba(0,144,55,0.42);
    }
    .btn-update:active {
      transform: scale(0.985);
      box-shadow: 0 2px 8px rgba(0,144,55,0.28);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
    }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="var(--slate-700)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-title">Change Password</div>
  </div>

  <!-- Form -->
  <div class="form-body">

    <div class="field-group">
      <div class="field-label">Current Password</div>
      <div class="field-wrap">
        <input class="field-input" type="password" placeholder="Enter current password" id="cur" />
        <button class="toggle-btn" onclick="togglePw('cur',this)" tabindex="-1">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.75"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <div class="field-label">New Password</div>
      <div class="field-wrap">
        <input class="field-input" type="password" placeholder="Enter new password" id="new" />
        <button class="toggle-btn" onclick="togglePw('new',this)" tabindex="-1">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.75"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">Confirm New Password</div>
      <div class="field-wrap">
        <input class="field-input" type="password" placeholder="Confirm new password" id="conf" />
        <button class="toggle-btn" onclick="togglePw('conf',this)" tabindex="-1">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.75"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="btn-update">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="11" width="18" height="11" rx="2" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 11V7a5 5 0 0110 0v4" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Update Password
    </button>
  </div>

  <!-- Bottom Nav — Home active -->
  <div class="bottom-nav">
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-4v-7H8v7H5a1 1 0 01-1-1V9.5z" fill="var(--green)"/></svg>
      </div>
      <span class="nav-label active">Home</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="7" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="17" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M7.5 12h5.5M13 12l3.5-4M13 12l3.5 4" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="nav-label">Network</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-fab-wrap">
      <div class="nav-fab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="15.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="14" y="18" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="18" width="3" height="3" rx="0.5" fill="white"/></svg>
      </div>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M16.5 7.5l-3 6-5.5 2.5 3-6 5.5-2.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="1" fill="var(--slate-400)"/></svg>
      </div>
      <span class="nav-label">Explore</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round"/></svg>
      </div>
      <span class="nav-label">Profile</span>
      <span class="nav-dot"></span>
    </div>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.75"/></svg>`;
    }
  </script>

</body>
</html>
