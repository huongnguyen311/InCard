<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — Language</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green:         #009037;
      --green-dark:    #007a2f;
      --green-light:   #2eb07a;
      --green-bg:      rgba(0,144,55,0.08);
      --green-border:  rgba(0,144,55,0.18);
      --slate-900:     #0f172a;
      --slate-800:     #1e293b;
      --slate-700:     #334155;
      --slate-600:     #475569;
      --slate-500:     #64748b;
      --slate-400:     #94a3b8;
      --slate-300:     #cbd5e1;
      --slate-200:     #e2e8f0;
      --slate-100:     #f1f5f9;
      --slate-50:      #f8fafc;
      --gray-bg:       #f4f4f5;
      --white:         #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

    body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      width: 390px;
      min-height: 100vh;
      padding-bottom: 96px;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0; z-index: 10;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--slate-200);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 12px;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--slate-200); }
    .header-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.3px;
    }

    /* ── LIST BODY ── */
    .list-body {
      padding: 24px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── LANGUAGE CARD ── */
    .lang-card {
      background: var(--white);
      border-radius: 0;
      border: 1px solid var(--slate-200);
      border-bottom: none;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .lang-card:first-child { border-radius: 18px 18px 0 0; }
    .lang-card:last-child  { border-radius: 0 0 18px 18px; border-bottom: 1px solid var(--slate-200); }
    .lang-card:only-child  { border-radius: 18px; border-bottom: 1px solid var(--slate-200); }
    .lang-card:hover { background: var(--slate-50); }
    .lang-card.selected { background: var(--green-bg); }

    /* Flag */
    .lang-flag {
      width: 40px; height: 40px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: var(--slate-100);
      border: 1px solid var(--slate-200);
    }

    /* Text */
    .lang-info { flex: 1; min-width: 0; }
    .lang-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.2px;
    }
    .lang-card.selected .lang-name { color: var(--green); }
    .lang-native {
      font-size: 12px;
      color: var(--slate-500);
      margin-top: 2px;
    }

    /* Checkmark */
    .lang-check {
      width: 24px; height: 24px;
      border-radius: 9999px;
      border: 2px solid var(--slate-200);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .lang-card.selected .lang-check {
      background: var(--green);
      border-color: var(--green);
    }

    /* Divider between rows */
    .lang-divider {
      height: 1px;
      background: var(--slate-100);
      margin: 0 20px;
      background: var(--slate-200);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
    }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="var(--slate-700)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-title">Language</div>
  </div>

  <!-- Language List -->
  <div class="list-body">

    <div class="lang-card selected" onclick="selectLang(this)">
      <div class="lang-flag">🇻🇳</div>
      <div class="lang-info">
        <div class="lang-name">Tiếng Việt</div>
        <div class="lang-native">Vietnamese</div>
      </div>
      <div class="lang-check">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="lang-divider"></div>

    <div class="lang-card" onclick="selectLang(this)">
      <div class="lang-flag">🇬🇧</div>
      <div class="lang-info">
        <div class="lang-name">English</div>
        <div class="lang-native">English</div>
      </div>
      <div class="lang-check">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

  </div>

  <!-- Bottom Nav — Home active -->
  <div class="bottom-nav">
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-4v-7H8v7H5a1 1 0 01-1-1V9.5z" fill="var(--green)"/></svg>
      </div>
      <span class="nav-label active">Home</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="7" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="17" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M7.5 12h5.5M13 12l3.5-4M13 12l3.5 4" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="nav-label">Network</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-fab-wrap">
      <div class="nav-fab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="15.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="14" y="18" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="18" width="3" height="3" rx="0.5" fill="white"/></svg>
      </div>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M16.5 7.5l-3 6-5.5 2.5 3-6 5.5-2.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="1" fill="var(--slate-400)"/></svg>
      </div>
      <span class="nav-label">Explore</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round"/></svg>
      </div>
      <span class="nav-label">Profile</span>
      <span class="nav-dot"></span>
    </div>
  </div>

  <script>
    function selectLang(card) {
      document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    }
  </script>

</body>
</html>
