<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Manage Google Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow: hidden; }
body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px;
      min-height: 100vh;
      padding-bottom: 96px;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0; z-index: 10;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--slate-200);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--slate-200); }
    .header-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.3px;
    }

    /* ── PAGE BODY ── */
    .page-body {
      padding: 24px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── SECTION CARD ── */
    .section-card {
      background: var(--white);
      border-radius: 20px;
      border: 1px solid var(--slate-200);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .section-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--slate-100);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .section-icon.google { background: #fef2f2; }
    .section-icon.logout { background: var(--red-50); }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--slate-800);
      letter-spacing: -0.1px;
    }
    .section-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── FIELD ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .field-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--slate-700);
    }
    .field-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .field-input {
      flex: 1;
      height: 52px;
      border-radius: 14px;
      border: 1.5px solid var(--slate-200);
      background: var(--slate-50);
      padding: 0 16px;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--slate-900);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-input::placeholder {
      color: var(--slate-400);
      font-weight: 400;
    }
    .field-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,144,55,0.1);
      background: var(--white);
    }

    /* connected indicator */
    .connected-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      background: var(--green-bg);
      border-radius: 20px;
      padding: 4px 10px;
      flex-shrink: 0;
    }
    .connected-dot {
      width: 6px; height: 6px;
      border-radius: 9999px;
      background: var(--green);
      flex-shrink: 0;
    }

    /* ── SAVE BUTTON ── */
    .btn-save {
      width: 100%;
      height: 50px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      box-shadow: 0 4px 14px rgba(0,144,55,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: box-shadow 0.15s, transform 0.1s;
    }
    .btn-save:hover { box-shadow: 0 6px 20px rgba(0,144,55,0.38); }
    .btn-save:active { transform: scale(0.985); box-shadow: 0 2px 8px rgba(0,144,55,0.22); }

    /* ── LOGOUT BUTTON ── */
    .btn-logout {
      width: 100%;
      height: 50px;
      border-radius: 14px;
      border: 1.5px solid var(--red-100);
      cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--red-600);
      background: var(--red-50);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-logout:hover { background: var(--red-100); }
    .btn-logout:active { transform: scale(0.985); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
    }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="var(--slate-700)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-title">Manage Google Account</div>
  </div>

  <div class="page-body">

    <!-- Google Authentication Section -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-icon google">
          <!-- Google G logo -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </div>
        <div class="section-title">Google Authentication</div>
        <div class="connected-badge">
          <span class="connected-dot"></span>
          Connected
        </div>
      </div>
      <div class="section-body">
        <div class="field-group">
          <div class="field-label">Google Email</div>
          <input class="field-input" type="email" value="alex.rivera@gmail.com" placeholder="Enter your Google email" />
        </div>
        <button class="btn-save">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="17 21 17 13 7 13 7 21" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="7 3 7 8 15 8" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Save &amp; Authenticate
        </button>
      </div>
    </div>

    <!-- Logout Section -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-icon logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="var(--red-600)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="16 17 21 12 16 7" stroke="var(--red-600)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="21" y1="12" x2="9" y2="12" stroke="var(--red-600)" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="section-title" style="color: var(--red-600);">Logout</div>
      </div>
      <div class="section-body">
        <p style="font-size:13px;color:var(--slate-500);line-height:1.6;">
          You will be signed out of your InCard account on this device.
        </p>
        <button class="btn-logout">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="var(--red-600)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="16 17 21 12 16 7" stroke="var(--red-600)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="21" y1="12" x2="9" y2="12" stroke="var(--red-600)" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
          Log Out
        </button>
      </div>
    </div>

  </div>

  <!-- Bottom Nav — Home active -->
  <div class="bottom-nav">
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-4v-7H8v7H5a1 1 0 01-1-1V9.5z" fill="var(--green)"/></svg>
      </div>
      <span class="nav-label active">Home</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="7" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="17" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M7.5 12h5.5M13 12l3.5-4M13 12l3.5 4" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="nav-label">Network</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-fab-wrap">
      <div class="nav-fab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="15.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="14" y="18" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="18" width="3" height="3" rx="0.5" fill="white"/></svg>
      </div>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M16.5 7.5l-3 6-5.5 2.5 3-6 5.5-2.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="1" fill="var(--slate-400)"/></svg>
      </div>
      <span class="nav-label">Explore</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-link">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round"/></svg>
      </div>
      <span class="nav-label">Profile</span>
      <span class="nav-dot"></span>
    </div>
  </div>

</body>
</html>
