<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Scan Multiple Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow: hidden; }
body {
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px;
      height: 844px;
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Status bar ── */
    .status-bar {
      height: 50px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.3px;
    }
    .status-icons {
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Header ── */
    .header {
      height: 52px;
      background: #000;
      display: flex; align-items: center;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
    }
    .header-title {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 700; color: white;
      letter-spacing: -0.2px;
    }
    .help-btn {
      width: 36px; height: 36px;
      border-radius: 9999px; border: 1.5px solid rgba(255,255,255,0.5);
      background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px; font-weight: 700;
    }

    /* ── Camera viewfinder ── */
    .viewfinder {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
    }

    .camera-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 35%, #2a2a2a 0%, transparent 55%),
        radial-gradient(ellipse at 80% 65%, #1e1e1e 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, #222 0%, transparent 70%),
        #111;
    }
    .camera-bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* ── Dual card guides ── */
    .dual-guides {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -54%);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .card-guide {
      position: relative;
      width: 172px;
      aspect-ratio: 1.74 / 1;
    }

    /* Slot label */
    .slot-label {
      position: absolute;
      top: -24px; left: 0; right: 0;
      text-align: center;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .slot-label.scanned {
      color: var(--green);
    }
    .slot-label.waiting {
      color: rgba(255,255,255,0.45);
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      border-style: solid;
    }
    .card-guide.scanned .corner { border-color: var(--green); }
    .card-guide.waiting .corner  { border-color: rgba(255,255,255,0.35); }

    .corner.tl { top: 0; left: 0;  border-width: 2.5px 0 0 2.5px; border-radius: 3px 0 0 0; }
    .corner.tr { top: 0; right: 0; border-width: 2.5px 2.5px 0 0; border-radius: 0 3px 0 0; }
    .corner.bl { bottom: 0; left: 0;  border-width: 0 0 2.5px 2.5px; border-radius: 0 0 0 3px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 2.5px 2.5px 0; border-radius: 0 0 3px 0; }

    /* Scan line — only on active (waiting) guide */
    .scan-line {
      position: absolute;
      left: 4px; right: 4px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      border-radius: 9999px;
      animation: scan-wait 2.4s ease-in-out infinite;
    }
    .card-guide.scanned .scan-line {
      display: none;
    }
    @keyframes scan-wait {
      0%   { top: 6px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 6px); opacity: 0; }
    }

    /* Green fill overlay for scanned card — shows "captured" state */
    .card-guide.scanned::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0, 144, 55, 0.08);
      border-radius: 2px;
    }

    /* Green active scan line */
    .scan-line-active {
      position: absolute;
      left: 4px; right: 4px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 9999px;
      animation: scan-active 2s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(0,144,55,0.8);
    }
    @keyframes scan-active {
      0%   { top: 6px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 6px); opacity: 0; }
    }

    /* Check icon for scanned card */
    .scan-check {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px;
      background: var(--green);
      border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 12px rgba(0,144,55,0.6);
    }

    /* Progress indicator */
    .scan-progress {
      position: absolute;
      bottom: 20px; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .progress-dots {
      display: flex; gap: 6px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 9999px;
    }
    .dot.done { background: var(--green); }
    .dot.next { background: rgba(255,255,255,0.3); }
    .progress-text {
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.3px;
    }
    .progress-text span {
      color: var(--green);
    }

    /* ── Counter badge ── */
    .counter-badge {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 9999px;
      padding: 4px 12px;
      font-size: 12px; font-weight: 700;
      color: white;
      backdrop-filter: blur(4px);
      display: flex; align-items: center; gap: 6px;
    }
    .counter-badge .count-green {
      color: var(--green);
    }

    /* ── Bottom controls ── */
    .controls {
      background: #000;
      padding: 18px 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    /* Toggle: One / Multiple */
    .toggle-wrap {
      background: rgba(255,255,255,0.12);
      border-radius: 9999px;
      padding: 4px;
      display: inline-flex;
    }
    .toggle-btn {
      height: 36px;
      padding: 0 28px;
      border-radius: 9999px;
      border: none;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .toggle-btn.inactive {
      background: transparent;
      color: rgba(255,255,255,0.6);
    }
    .toggle-btn.active {
      background: var(--green);
      color: white;
      box-shadow: 0 2px 10px rgba(0,144,55,0.5);
    }

    /* Shutter + add more row */
    .shutter-row {
      display: flex; align-items: center; gap: 28px;
    }
    .add-more-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
    }
    .add-more-circle {
      width: 44px; height: 44px; border-radius: 9999px;
      border: 2px dashed rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.5);
      font-size: 22px; font-weight: 300; line-height: 1;
    }
    .add-more-label {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.2px;
    }

    .shutter {
      width: 72px; height: 72px; border-radius: 9999px;
      background: rgba(255,255,255,0.2);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .shutter-inner {
      width: 58px; height: 58px; border-radius: 9999px;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(0,144,55,0.3), 0 4px 16px rgba(0,144,55,0.5);
      display: flex; align-items: center; justify-content: center;
    }

    /* Cards counter label next to shutter */
    .cards-remaining {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .cards-remaining-num {
      width: 44px; height: 44px; border-radius: 9999px;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: rgba(255,255,255,0.6);
    }
    .cards-remaining-label {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.2px;
    }

    /* ── Bottom tab bar ── */
    .tab-bar {
      background: white;
      border-top: 1px solid #e2e8f0;
      display: flex;
      height: 72px;
      flex-shrink: 0;
    }
    .tab-item {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px; padding-bottom: 4px;
      cursor: pointer;
    }
    .tab-item-icon {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }
    .tab-item-label {
      font-size: 10px; font-weight: 600;
      color: #94a3b8;
      text-align: center; line-height: 1.2;
    }
    .tab-item.active .tab-item-label { color: var(--green); }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-time">9:57</div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0" y="4" width="3" height="8" rx="1" fill="white" opacity="0.4"/>
        <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="white" opacity="0.6"/>
        <rect x="9" y="1" width="3" height="11" rx="1" fill="white" opacity="0.8"/>
        <rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 18 14" fill="none">
        <path d="M9 3.5C11.6 3.5 14 4.6 15.7 6.4L17.3 4.7C15.1 2.4 12.2 1 9 1C5.8 1 2.9 2.4.7 4.7L2.3 6.4C4 4.6 6.4 3.5 9 3.5Z" fill="white" opacity="0.5"/>
        <path d="M9 7C10.7 7 12.2 7.7 13.3 8.8L14.9 7.1C13.4 5.8 11.8 5 9 5C6.2 5 4.6 5.8 3.1 7.1L4.7 8.8C5.8 7.7 7.3 7 9 7Z" fill="white" opacity="0.75"/>
        <circle cx="9" cy="12" r="2" fill="white"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="14" height="9" rx="2" fill="white" opacity="0.9"/>
        <path d="M24 4.5v4a2 2 0 000-4z" fill="white" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <button class="back-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12l6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-title"></div>
    <button class="help-btn">?</button>
  </div>

  <!-- Camera viewfinder -->
  <div class="viewfinder">
    <div class="camera-bg"></div>

    <!-- Two card guides side by side -->
    <div class="dual-guides">

      <!-- Card 1 — already scanned (green, check mark) -->
      <div class="card-guide scanned">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <!-- Green check mark overlay -->
        <div class="scan-check">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Card 2 — waiting to be scanned (dim, animated scan line) -->
      <div class="card-guide waiting">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scan-line-active"></div>
      </div>

    </div>

  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- One / Multiple toggle -->
    <div class="toggle-wrap">
      <button class="toggle-btn inactive" onclick="setMode(this,'one')">One</button>
      <button class="toggle-btn active"   onclick="setMode(this,'multiple')">Multiple</button>
    </div>

    <!-- Shutter row: Add More · Shutter · Cards count -->
    <div class="shutter-row">
      <div class="add-more-btn">
        <div class="add-more-circle">+</div>
        <div class="add-more-label">Add slot</div>
      </div>

      <button class="shutter">
        <div class="shutter-inner">
          <!-- Camera icon inside shutter for multi-mode -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="13" r="4" stroke="white" stroke-width="1.8"/>
          </svg>
        </div>
      </button>

      <div class="cards-remaining">
        <div class="cards-remaining-num">1</div>
        <div class="cards-remaining-label">remaining</div>
      </div>
    </div>

  </div>

  <!-- Tab bar -->
  <div class="tab-bar">

    <div class="tab-item active">
      <div class="tab-item-icon">
        <svg width="24" height="20" viewBox="0 0 24 20" fill="none">
          <rect x="1" y="1" width="22" height="14" rx="2.5" stroke="var(--green)" stroke-width="1.6"/>
          <path d="M5 6h6M5 10h10" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="1" y="1" width="3" height="14" rx="1.5" fill="var(--green)"/>
          <path d="M8 18h8" stroke="var(--green)" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
        </svg>
      </div>
      <div class="tab-item-label" style="color:var(--green);">Business<br>Card</div>
    </div>

    <div class="tab-item">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 3h5v5H3zM16 3h5v5h-5zM3 16h5v5H3z" stroke="#94a3b8" stroke-width="1.6" stroke-linejoin="round"/>
          <rect x="5" y="5" width="1" height="1" fill="#94a3b8"/>
          <rect x="18" y="5" width="1" height="1" fill="#94a3b8"/>
          <rect x="5" y="18" width="1" height="1" fill="#94a3b8"/>
          <path d="M16 16h2v2h-2zM20 16v2M16 20h2M20 20v-1" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">Scan QR</div>
    </div>

    <div class="tab-item">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 3h5v5H3zM16 3h5v5h-5zM3 16h5v5H3z" stroke="#94a3b8" stroke-width="1.6" stroke-linejoin="round"/>
          <rect x="5" y="5" width="1" height="1" fill="#94a3b8"/>
          <rect x="18" y="5" width="1" height="1" fill="#94a3b8"/>
          <rect x="5" y="18" width="1" height="1" fill="#94a3b8"/>
          <path d="M16 16h2v2h-2zM20 16v2M16 20h2M20 20v-1" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="20" cy="4" r="3" fill="#94a3b8"/>
          <path d="M19 4h2M20 3v2" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">Personal<br>QR</div>
    </div>

    <div class="tab-item">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 21v-8H7v8M7 3v5h8" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="tab-item-label">QR Offline</div>
    </div>

  </div>

  <script>
    function setMode(btn, mode) {
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.className = 'toggle-btn inactive';
      });
      btn.className = 'toggle-btn active';
    }
  </script>

</body>
</html>
