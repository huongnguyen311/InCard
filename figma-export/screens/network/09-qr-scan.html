<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — QR Scan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    html { width: 390px; overflow: hidden; }

* { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; }
    body {
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px; height: 844px;
      background: #000;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* STATUS BAR */
    .status-bar {
      height: 50px; background: #000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; flex-shrink: 0;
    }
    .status-time { font-size: 15px; font-weight: 700; color: white; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    /* HEADER */
    .header {
      height: 52px; background: #000;
      display: flex; align-items: center; padding: 0 20px;
      flex-shrink: 0; gap: 0;
    }
    .back-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.1); border-radius: 10px; border: none; cursor: pointer;
    }
    .header-title {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 700; color: white;
    }
    .help-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px; font-weight: 700;
    }

    /* VIEWFINDER */
    .viewfinder {
      flex: 1; position: relative; overflow: hidden; background: #0d0d0d;
    }
    .camera-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, #202020 0%, transparent 55%),
        radial-gradient(ellipse at 70% 65%, #1a1a1a 0%, transparent 50%),
        #0d0d0d;
    }
    /* dark vignette overlay */
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 48%, transparent 40%, rgba(0,0,0,0.6) 100%);
    }

    /* QR frame — square */
    .qr-guide {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -54%);
      width: 230px; height: 230px;
    }
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--green);
      border-style: solid;
    }
    .corner.tl { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    /* inner glow border */
    .qr-inner-border {
      position: absolute; inset: 12px;
      border: 1px solid rgba(0,144,55,0.15);
      border-radius: 4px;
    }

    /* scan line */
    .scan-line {
      position: absolute;
      left: 6px; right: 6px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--green) 30%, var(--green-light) 50%, var(--green) 70%, transparent);
      border-radius: 9999px;
      animation: scan 2s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(0,144,55,0.9), 0 0 20px rgba(0,144,55,0.4);
    }
    @keyframes scan {
      0%   { top: 8px; opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { top: calc(100% - 8px); opacity: 0; }
    }

    /* tip label */
    .view-tip {
      position: absolute; bottom: 24px; left: 0; right: 0;
      text-align: center;
      font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.45);
    }

    /* flash / gallery row */
    .util-row {
      position: absolute; top: 18px; right: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .util-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* CONTROLS */
    .controls {
      background: #000; padding: 16px 24px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      flex-shrink: 0;
    }
    .shutter-wrap { display: flex; align-items: center; gap: 40px; }
    .shutter {
      width: 68px; height: 68px; border-radius: 9999px;
      background: rgba(255,255,255,0.1);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .shutter-inner {
      width: 54px; height: 54px; border-radius: 9999px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      box-shadow: 0 0 0 3px rgba(0,144,55,0.25), 0 4px 18px rgba(0,144,55,0.55);
      display: flex; align-items: center; justify-content: center;
    }
    .side-action {
      width: 46px; height: 46px; border-radius: 14px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .hint-text {
      font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* TAB BAR */
    .tab-bar {
      background: #0a0a0a;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; height: 72px; flex-shrink: 0; padding: 0 4px;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px; padding-bottom: 4px; cursor: pointer;
    }
    .tab-item-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .tab-item.active .tab-item-icon { background: rgba(0,144,55,0.16); }
    .tab-item-label {
      font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3);
      text-align: center; line-height: 1.2;
    }
    .tab-item.active .tab-item-label { color: var(--green); }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-time">9:57</div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0" y="4" width="3" height="8" rx="1" fill="white" opacity="0.4"/>
        <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="white" opacity="0.6"/>
        <rect x="9" y="1" width="3" height="11" rx="1" fill="white" opacity="0.8"/>
        <rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 18 14" fill="none">
        <path d="M9 3.5C11.6 3.5 14 4.6 15.7 6.4L17.3 4.7C15.1 2.4 12.2 1 9 1C5.8 1 2.9 2.4.7 4.7L2.3 6.4C4 4.6 6.4 3.5 9 3.5Z" fill="white" opacity="0.5"/>
        <path d="M9 7C10.7 7 12.2 7.7 13.3 8.8L14.9 7.1C13.4 5.8 11.8 5 9 5C6.2 5 4.6 5.8 3.1 7.1L4.7 8.8C5.8 7.7 7.3 7 9 7Z" fill="white" opacity="0.75"/>
        <circle cx="9" cy="12" r="2" fill="white"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="14" height="9" rx="2" fill="white" opacity="0.9"/>
        <path d="M24 4.5v4a2 2 0 000-4z" fill="white" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <button class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12l6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-title">Scan Card</div>
    <div style="width:36px;"></div>
  </div>

  <!-- Viewfinder -->
  <div class="viewfinder">
    <div class="camera-bg"></div>
    <div class="vignette"></div>

    <!-- QR frame -->
    <div class="qr-guide">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="qr-inner-border"></div>
      <div class="scan-line"></div>
    </div>

    <div class="view-tip">Point camera at a QR code</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="shutter-wrap">
      <button class="shutter">
        <div class="shutter-inner">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.8"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.8"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.8"/>
            <path d="M14 17.5h7M17.5 14v7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
      </button>
    </div>
    <div class="hint-text">Tap shutter or point camera to scan automatically</div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">

    <div class="tab-item active">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="var(--green)" stroke-width="1.7"/>
          <rect x="4" y="4" width="4" height="4" rx="0.5" fill="var(--green)" opacity="0.8"/>
          <rect x="14" y="2" width="8" height="8" rx="1.5" stroke="var(--green)" stroke-width="1.7"/>
          <rect x="16" y="4" width="4" height="4" rx="0.5" fill="var(--green)" opacity="0.8"/>
          <rect x="2" y="14" width="8" height="8" rx="1.5" stroke="var(--green)" stroke-width="1.7"/>
          <rect x="4" y="16" width="4" height="4" rx="0.5" fill="var(--green)" opacity="0.8"/>
          <path d="M14 17.5h8M18 14v8" stroke="var(--green)" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">QR Scan</div>
    </div>

    <div class="tab-item">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="14" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="16" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="2" y="14" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="16" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <path d="M14 17.5h8M18 14v8" stroke="rgba(255,255,255,0.35)" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">QR Profile</div>
    </div>

    <div class="tab-item">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="14" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="16" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="2" y="14" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="16" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <path d="M14 17.5h8M18 14v8" stroke="rgba(255,255,255,0.35)" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">QR Offline</div>
    </div>

  </div>

</body>
</html>
