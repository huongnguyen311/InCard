<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — AI Search Contacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow: hidden; }
body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px;
      min-height: 844px;
      position: relative;
    }

    /* ── Dimmed background (contacts list behind) ── */
    .bg-screen {
      position: absolute; inset: 0;
      background: rgba(15,23,42,0.45);
      backdrop-filter: blur(2px);
      z-index: 10;
    }

    /* ── Bottom sheet ── */
    .sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-radius: 24px 24px 0 0;
      z-index: 20;
      padding: 0 0 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
    }

    /* Drag handle */
    .drag-handle {
      width: 36px; height: 4px;
      background: var(--slate-200);
      border-radius: 9999px;
      margin: 12px auto 0;
    }

    /* Sheet header */
    .sheet-header {
      padding: 20px 20px 0;
      display: flex; align-items: center; gap: 10px;
    }
    .ai-badge {
      height: 32px; padding: 0 12px 0 10px;
      border-radius: 9999px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
      box-shadow: 0 3px 14px rgba(239,80,35,0.35);
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .ai-badge-label {
      font-size: 12px; font-weight: 800; color: white;
      letter-spacing: 0.5px;
    }
    .sheet-title {
      font-size: 16px; font-weight: 700; color: var(--slate-900);
      letter-spacing: -0.2px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 20px 0;
      position: relative;
    }
    .question-input {
      width: 100%;
      min-height: 80px;
      background: var(--slate-50);
      border: 1.5px solid var(--slate-200);
      border-radius: 16px;
      padding: 14px 52px 14px 16px;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px; font-weight: 400;
      color: var(--slate-900);
      resize: none; outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .question-input::placeholder { color: var(--slate-400); }
    .question-input:focus { border-color: var(--orange); }
    .send-btn {
      position: absolute;
      bottom: 12px; right: 32px;
      width: 36px; height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(239,80,35,0.35);
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }

    /* ── Divider ── */
    .section-divider {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px 0;
    }
    .divider-line { flex: 1; height: 1px; background: var(--slate-200); }
    .divider-label {
      font-size: 10px; font-weight: 700; color: var(--slate-400);
      text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
    }

    /* ── Sample questions ── */
    .sample-list {
      padding: 10px 20px 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .sample-q {
      display: flex; align-items: center; gap: 12px;
      background: var(--slate-50);
      border: 1.5px solid var(--slate-200);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      text-align: left;
      font-family: 'Public Sans', sans-serif;
    }
    .sample-q:hover {
      border-color: rgba(239,80,35,0.4);
      background: rgba(239,80,35,0.06);
    }
    .sample-q-icon {
      width: 30px; height: 30px; border-radius: 9px;
      background: linear-gradient(135deg, rgba(239,80,35,0.1), rgba(250,152,125,0.1));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sample-q-text {
      flex: 1;
      font-size: 13px; font-weight: 500; color: var(--slate-700);
      line-height: 1.4;
    }
    .sample-q-arrow {
      flex-shrink: 0; color: var(--slate-400);
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Dimmed background -->
  <div class="bg-screen"></div>

  <!-- Bottom sheet -->
  <div class="sheet">
    <div class="drag-handle"></div>

    <!-- Header -->
    <div class="sheet-header">
      <div class="ai-badge">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M8 1C8 1 8.6 4.4 9.8 5.8C11 7.2 14 8 14 8C14 8 11 8.8 9.8 10.2C8.6 11.6 8 15 8 15C8 15 7.4 11.6 6.2 10.2C5 8.8 2 8 2 8C2 8 5 7.2 6.2 5.8C7.4 4.4 8 1 8 1Z" fill="white"/>
          <path d="M13 2C13 2 13.3 3.4 13.9 4C14.5 4.6 16 5 16 5C16 5 14.5 5.4 13.9 6C13.3 6.6 13 8 13 8C13 8 12.7 6.6 12.1 6C11.5 5.4 10 5 10 5C10 5 11.5 4.6 12.1 4C12.7 3.4 13 2 13 2Z" fill="white" opacity="0.7"/>
        </svg>
        <span class="ai-badge-label">AI</span>
      </div>
      <div class="sheet-title">Search Contacts</div>
    </div>

    <!-- Text input -->
    <div class="input-area">
      <textarea
        class="question-input"
        placeholder="Ask anything about your contacts…"
        id="queryInput"
      ></textarea>
      <button class="send-btn" onclick="submitQuery()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M17 10L3 3l3 7-3 7 14-7z" fill="white"/>
        </svg>
      </button>
    </div>

    <!-- Divider -->
    <div class="section-divider">
      <div class="divider-line"></div>
      <div class="divider-label">Suggested questions</div>
      <div class="divider-line"></div>
    </div>

    <!-- Sample questions -->
    <div class="sample-list">

      <button class="sample-q" onclick="useQuestion(this)">
        <div class="sample-q-icon">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="var(--orange)" stroke-width="1.6"/>
            <path d="M9 6v3l2 2" stroke="var(--orange)" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M14 14l3 3" stroke="var(--orange)" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="sample-q-text">Find 3 most recently added contacts</span>
        <svg class="sample-q-arrow" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="sample-q" onclick="useQuestion(this)">
        <div class="sample-q-icon">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <path d="M10 2l2.4 4.8 5.3.8-3.8 3.7.9 5.2L10 14l-4.8 2.5.9-5.2-3.8-3.7 5.3-.8L10 2z" stroke="var(--orange)" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="sample-q-text">Find contacts related to my product or service</span>
        <svg class="sample-q-arrow" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="sample-q" onclick="useQuestion(this)">
        <div class="sample-q-icon">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="4" width="14" height="12" rx="2" stroke="var(--orange)" stroke-width="1.5"/>
            <path d="M7 9h6M7 12h4" stroke="var(--orange)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="sample-q-text">Show 5 contacts I updated in the past 2 weeks</span>
        <svg class="sample-q-arrow" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="sample-q" onclick="useQuestion(this)">
        <div class="sample-q-icon">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <circle cx="7" cy="8" r="3.5" stroke="var(--orange)" stroke-width="1.5"/>
            <circle cx="14" cy="6" r="2.5" stroke="var(--orange)" stroke-width="1.5"/>
            <path d="M2 17c0-2.2 2-4 5-4s5 1.8 5 4" stroke="var(--orange)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 11c2 0 4 1.2 4 3" stroke="var(--orange)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="sample-q-text">Show contacts marked as potential clients</span>
        <svg class="sample-q-arrow" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="sample-q" onclick="useQuestion(this)">
        <div class="sample-q-icon">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <path d="M10 3C6.1 3 3 6.1 3 10s3.1 7 7 7 7-3.1 7-7-3.1-7-7-7z" stroke="var(--orange)" stroke-width="1.5"/>
            <path d="M10 7v4l3 1.5" stroke="var(--orange)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="sample-q-text">Find 3 recent contacts tagged VIP</span>
        <svg class="sample-q-arrow" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>
  </div>

  <script>
    function useQuestion(btn) {
      const text = btn.querySelector('.sample-q-text').textContent;
      document.getElementById('queryInput').value = text;
      document.getElementById('queryInput').focus();
    }
    function submitQuery() {
      // placeholder — would trigger AI search
    }
  </script>

</body>
</html>
