<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — QR Profile</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green:       #009037;
      --green-light: #2eb07a;
      --white:       #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; }
    body {
      font-family: 'Public Sans', sans-serif;
      width: 390px; height: 844px;
      background: #000;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* STATUS BAR */
    .status-bar {
      height: 50px; background: #000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; flex-shrink: 0;
    }
    .status-time { font-size: 15px; font-weight: 700; color: white; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    /* HEADER */
    .header {
      height: 52px; background: #000;
      display: flex; align-items: center; padding: 0 20px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.1); border-radius: 10px; border: none; cursor: pointer;
    }
    .header-title {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 700; color: white;
    }
    .share-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* MAIN CONTENT */
    .content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 32px; gap: 0;
      background: #0a0a0a;
      position: relative; overflow: hidden;
    }
    /* subtle radial glow behind card */
    .content::before {
      content: '';
      position: absolute; top: 30%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px; border-radius: 9999px;
      background: radial-gradient(circle, rgba(0,144,55,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* card label */
    .card-label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35);
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 20px; align-self: flex-start;
    }

    /* QR card */
    .qr-card {
      background: white;
      border-radius: 24px;
      padding: 24px 24px 20px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    /* profile mini row inside card */
    .qr-profile-row {
      width: 100%;
      display: flex; align-items: center; gap: 12px;
    }
    .qr-avatar {
      width: 44px; height: 44px; border-radius: 9999px;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .qr-profile-info { flex: 1; min-width: 0; }
    .qr-name { font-size: 15px; font-weight: 800; color: #0f172a; }
    .qr-role { font-size: 11px; color: #64748b; margin-top: 1px; }
    .qr-incard-badge {
      display: flex; align-items: center; gap: 4px;
      background: rgba(0,144,55,0.08);
      border: 1px solid rgba(0,144,55,0.2);
      border-radius: 8px; padding: 5px 8px;
      flex-shrink: 0;
    }
    .qr-incard-badge span { font-size: 10px; font-weight: 700; color: var(--green); }

    /* divider */
    .qr-divider { width: 100%; height: 1px; background: #f1f5f9; }

    /* QR code block */
    .qr-code-wrap {
      width: 190px; height: 190px;
      padding: 10px; background: white;
      border: 1px solid #e8e8ec; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .qr-code-wrap svg { width: 170px; height: 170px; }

    /* scan instruction */
    .qr-instruction {
      font-size: 12px; color: #94a3b8; text-align: center; line-height: 1.5;
    }

    /* action row */
    .action-row {
      width: 100%; display: flex; gap: 10px;
    }
    .action-btn {
      flex: 1; height: 44px; border-radius: 12px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px; font-weight: 700;
    }
    .action-btn.primary {
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      color: white;
      box-shadow: 0 3px 12px rgba(0,144,55,0.35);
    }
    .action-btn.secondary {
      background: #f1f5f9; color: #334155;
    }

    /* card selector dots */
    .card-selector {
      display: flex; align-items: center; gap: 8px; margin-top: 16px;
    }
    .card-dot {
      width: 8px; height: 8px; border-radius: 9999px;
      background: rgba(255,255,255,0.2);
      transition: all 0.2s;
    }
    .card-dot.active {
      width: 22px;
      background: linear-gradient(90deg, var(--green), var(--green-light));
    }
    .card-selector-label {
      font-size: 11px; color: rgba(255,255,255,0.35);
      margin-left: 4px;
    }

    /* TAB BAR */
    .tab-bar {
      background: #0a0a0a;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; height: 72px; flex-shrink: 0; padding: 0 4px;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px; padding-bottom: 4px; cursor: pointer;
    }
    .tab-item-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .tab-item.active .tab-item-icon { background: rgba(0,144,55,0.16); }
    .tab-item-label {
      font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3);
      text-align: center; line-height: 1.2;
    }
    .tab-item.active .tab-item-label { color: var(--green); }
  </style>
</head>
<body>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-time">9:57</div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0" y="4" width="3" height="8" rx="1" fill="white" opacity="0.4"/>
        <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="white" opacity="0.6"/>
        <rect x="9" y="1" width="3" height="11" rx="1" fill="white" opacity="0.8"/>
        <rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 18 14" fill="none">
        <path d="M9 3.5C11.6 3.5 14 4.6 15.7 6.4L17.3 4.7C15.1 2.4 12.2 1 9 1C5.8 1 2.9 2.4.7 4.7L2.3 6.4C4 4.6 6.4 3.5 9 3.5Z" fill="white" opacity="0.5"/>
        <path d="M9 7C10.7 7 12.2 7.7 13.3 8.8L14.9 7.1C13.4 5.8 11.8 5 9 5C6.2 5 4.6 5.8 3.1 7.1L4.7 8.8C5.8 7.7 7.3 7 9 7Z" fill="white" opacity="0.75"/>
        <circle cx="9" cy="12" r="2" fill="white"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="14" height="9" rx="2" fill="white" opacity="0.9"/>
        <path d="M24 4.5v4a2 2 0 000-4z" fill="white" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <button class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12l6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-title">Scan Card</div>
    <div style="width:36px;"></div>
  </div>

  <!-- Content -->
  <div class="content">

    <div class="qr-card">

      <!-- Profile row -->
      <div class="qr-profile-row">
        <div class="qr-avatar">T</div>
        <div class="qr-profile-info">
          <div class="qr-name">Thu Nguyen</div>
          <div class="qr-role">Product Designer · InCard</div>
        </div>
      </div>

      <div class="qr-divider"></div>

      <!-- QR code -->
      <div class="qr-code-wrap">
        <svg viewBox="0 0 170 170" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Top-left finder -->
          <rect x="10" y="10" width="50" height="50" rx="6" fill="#009037"/>
          <rect x="20" y="20" width="30" height="30" rx="3" fill="white"/>
          <rect x="26" y="26" width="18" height="18" rx="2" fill="#009037"/>
          <!-- Top-right finder -->
          <rect x="110" y="10" width="50" height="50" rx="6" fill="#009037"/>
          <rect x="120" y="20" width="30" height="30" rx="3" fill="white"/>
          <rect x="126" y="26" width="18" height="18" rx="2" fill="#009037"/>
          <!-- Bottom-left finder -->
          <rect x="10" y="110" width="50" height="50" rx="6" fill="#009037"/>
          <rect x="20" y="120" width="30" height="30" rx="3" fill="white"/>
          <rect x="26" y="126" width="18" height="18" rx="2" fill="#009037"/>
          <!-- Data modules (simplified pattern) -->
          <rect x="72" y="10" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="82" y="10" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="72" y="20" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="72" y="30" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="82" y="30" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="72" y="40" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="82" y="50" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="72" y="50" width="6" height="6" rx="1" fill="#2eb07a"/>
          <!-- Center logo placeholder -->
          <rect x="68" y="68" width="34" height="34" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
          <rect x="74" y="74" width="22" height="22" rx="5" fill="#009037"/>
          <path d="M79 85l3 3 6-6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- More data modules -->
          <rect x="110" y="72" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="120" y="72" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="130" y="72" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="140" y="72" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="150" y="72" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="110" y="82" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="130" y="82" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="150" y="82" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="10" y="72" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="20" y="72" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="30" y="72" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="40" y="72" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="50" y="72" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="10" y="82" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="30" y="82" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="50" y="82" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="72" y="110" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="82" y="110" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="72" y="120" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="82" y="130" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="72" y="140" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="82" y="150" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="110" y="110" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="120" y="120" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="130" y="110" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="140" y="130" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="150" y="120" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="110" y="140" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="130" y="150" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="150" y="140" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="140" y="110" width="6" height="6" rx="1" fill="#2eb07a"/>
          <rect x="120" y="140" width="6" height="6" rx="1" fill="#009037"/>
          <rect x="140" y="150" width="6" height="6" rx="1" fill="#2eb07a"/>
        </svg>
      </div>

      <div class="qr-instruction">Scan with any InCard or phone camera<br>to view profile and connect</div>

      <!-- Action buttons -->
      <div class="action-row">
        <button class="action-btn secondary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13" stroke="#334155" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Share
        </button>
        <button class="action-btn primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Save Image
        </button>
      </div>

    </div>

    <!-- Card selector dots -->
    <div class="card-selector">
      <div class="card-dot active"></div>
      <div class="card-dot"></div>
      <div class="card-dot"></div>
      <span class="card-selector-label">1 of 3 cards</span>
    </div>

  </div>

  <!-- Tab bar -->
  <div class="tab-bar">

    <div class="tab-item">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="14" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="16" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="2" y="14" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="16" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <path d="M14 17.5h8M18 14v8" stroke="rgba(255,255,255,0.35)" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">QR Scan</div>
    </div>

    <div class="tab-item active">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="var(--green)" stroke-width="1.7"/>
          <rect x="4" y="4" width="4" height="4" rx="0.5" fill="var(--green)" opacity="0.8"/>
          <rect x="14" y="2" width="8" height="8" rx="1.5" stroke="var(--green)" stroke-width="1.7"/>
          <rect x="16" y="4" width="4" height="4" rx="0.5" fill="var(--green)" opacity="0.8"/>
          <rect x="2" y="14" width="8" height="8" rx="1.5" stroke="var(--green)" stroke-width="1.7"/>
          <rect x="4" y="16" width="4" height="4" rx="0.5" fill="var(--green)" opacity="0.8"/>
          <path d="M14 17.5h8M18 14v8" stroke="var(--green)" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">QR Profile</div>
    </div>

    <div class="tab-item">
      <div class="tab-item-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="14" y="2" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="16" y="4" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <rect x="2" y="14" width="8" height="8" rx="1.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.7"/>
          <rect x="4" y="16" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.35)"/>
          <path d="M14 17.5h8M18 14v8" stroke="rgba(255,255,255,0.35)" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tab-item-label">QR Offline</div>
    </div>

  </div>

</body>
</html>
