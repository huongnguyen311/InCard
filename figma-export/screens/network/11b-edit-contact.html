<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Edit Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow: hidden; }
body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px;
      min-height: 844px;
      padding-bottom: 132px;
    }

    /* ── Header ── */
    .header {
      position: fixed; top: 0; left: 0; z-index: 50;
      width: 390px;
      background: var(--white);
      border-bottom: 1px solid var(--slate-200);
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; gap: 8px;
    }
    .header-spacer { height: 56px; }
    .back-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px; background: var(--slate-100);
      flex-shrink: 0; cursor: pointer; border: none;
    }
    .header-title {
      flex: 1;
      font-size: 16px; font-weight: 700;
      color: var(--slate-900); letter-spacing: -0.2px;
    }

    /* ── Hero: avatar editable + identity inputs ── */
    .hero {
      background: var(--white);
      border-bottom: 6px solid var(--gray-bg);
      padding: 20px 16px 18px;
      display: flex; align-items: flex-start; gap: 16px;
    }
    .avatar-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
    .avatar {
      width: 72px; height: 72px; border-radius: 9999px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: rgba(99,102,241,0.12);
      border: 3px solid var(--white);
      box-shadow: 0 0 0 2px rgba(99,102,241,0.25);
    }
    .avatar-initials {
      font-size: 26px; font-weight: 800; color: #6366f1;
      letter-spacing: -0.5px;
    }
    /* Camera overlay on avatar */
    .avatar-edit-overlay {
      position: absolute; inset: 0; border-radius: 9999px;
      background: rgba(0,0,0,0.32);
      display: flex; align-items: center; justify-content: center;
    }

    /* Identity inline inputs — look like view mode */
    .hero-info { flex: 1; min-width: 0; }
    .hero-field { position: relative; margin-bottom: 2px; }
    .hero-input-name {
      width: 100%;
      font-family: 'Public Sans', sans-serif;
      font-size: 20px; font-weight: 800; color: var(--slate-900);
      letter-spacing: -0.5px;
      background: transparent; border: none; outline: none;
      border-bottom: 1.5px solid var(--slate-200);
      padding: 2px 0 4px;
      caret-color: var(--green);
    }
    .hero-input-name:focus { border-bottom-color: var(--green); }
    .hero-input-role {
      width: 100%;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--slate-500);
      background: transparent; border: none; outline: none;
      border-bottom: 1.5px solid var(--slate-200);
      padding: 2px 0 4px; margin-top: 2px;
      caret-color: var(--green);
    }
    .hero-input-role:focus { border-bottom-color: var(--green); }
    .hero-input-company {
      width: 100%;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--slate-700);
      background: transparent; border: none; outline: none;
      border-bottom: 1.5px solid transparent;
      padding: 2px 0 2px; margin-top: 2px;
      caret-color: var(--green);
    }
    .hero-input-company:focus { border-bottom-color: var(--green); }

    /* ── Tags section (editable) ── */
    .tags-section {
      padding: 10px 16px 10px;
      background: var(--gray-bg);
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .tag-chip {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 9999px; padding: 3px 8px 3px 10px;
      font-size: 11px; font-weight: 600;
    }
    .tag-chip.green { background: var(--green-bg); color: var(--green); }
    .tag-chip.gray  { background: var(--slate-200); color: var(--slate-600); }
    .tag-remove {
      width: 14px; height: 14px; border-radius: 9999px;
      background: rgba(0,0,0,0.12); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0;
    }
    .tag-add {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--white); border: 1.5px dashed var(--slate-300);
      border-radius: 9999px; padding: 3px 10px;
      font-size: 11px; font-weight: 600; color: var(--slate-400);
      cursor: pointer;
    }

    /* ── Section header ── */
    .section-header {
      padding: 10px 16px 6px;
      font-size: 10px; font-weight: 700; color: var(--slate-400);
      text-transform: uppercase; letter-spacing: 1px;
      background: var(--gray-bg);
    }

    /* ── Contact rows — editable ── */
    .contact-section { background: var(--white); overflow: hidden; }
    .contact-row {
      display: flex; align-items: center;
      padding: 10px 16px; gap: 12px;
      border-bottom: 1px solid var(--slate-100);
      background: var(--white);
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-icon {
      width: 38px; height: 38px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .contact-text { flex: 1; min-width: 0; }
    .contact-type {
      font-size: 10px; font-weight: 700; color: var(--slate-400);
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 3px;
    }
    /* Inline editable contact value */
    .contact-input {
      width: 100%;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px; font-weight: 500; color: var(--slate-800);
      background: transparent; border: none; outline: none;
      border-bottom: 1.5px solid var(--slate-200);
      padding: 2px 0 3px;
      caret-color: var(--green);
    }
    .contact-input:focus { border-bottom-color: var(--green); }

    /* ── Note editable ── */
    .note-section { background: var(--gray-bg); }
    .note-block { background: var(--white); }
    .note-inner { padding: 12px 16px 14px; }
    .note-textarea {
      width: 100%;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px; font-weight: 400; color: var(--slate-600);
      line-height: 1.65;
      background: var(--slate-50);
      border: 1.5px solid var(--green);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 88px;
      resize: none; outline: none;
      caret-color: var(--green);
    }

    /* ── Meta ── */
    .meta {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px 20px;
      background: var(--gray-bg);
    }
    .meta span { font-size: 11px; font-weight: 500; color: var(--slate-400); }

    /* ── Action Bar — Cancel + Save ── */
    .action-bar {
      position: fixed; bottom: 72px; left: 0;
      width: 390px;
      background: var(--white);
      border-top: 1px solid var(--slate-200);
      padding: 12px 16px;
      display: flex; gap: 8px;
      z-index: 40;
    }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px; font-weight: 700; height: 48px;
    }
    .btn-cancel {
      width: 96px; flex-shrink: 0;
      background: var(--slate-100); color: var(--slate-600);
    }
    .btn-save {
      flex: 1;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      color: var(--white);
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
      position: relative;
    }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <button class="back-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8l4-4" stroke="var(--slate-800)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-title">Edit Contact</div>
  </div>
  <div class="header-spacer"></div>

  <!-- Hero: avatar + editable identity -->
  <div class="hero">
    <div class="avatar-wrap">
      <div class="avatar">
        <span class="avatar-initials">JO</span>
      </div>
      <div class="avatar-edit-overlay">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="white" stroke-width="1.8"/>
        </svg>
      </div>
    </div>
    <div class="hero-info">
      <div class="hero-field">
        <input class="hero-input-name" type="text" value="James Okafor" />
      </div>
      <div class="hero-field">
        <input class="hero-input-role" type="text" value="Founder & CEO" />
      </div>
      <div class="hero-field">
        <input class="hero-input-company" type="text" value="BuildFast Technologies" />
      </div>
    </div>
  </div>

  <!-- Tags (editable chips) -->
  <div class="tags-section">
    <span class="tag-chip green">
      Lead
      <button class="tag-remove">
        <svg width="8" height="8" viewBox="0 0 10 10" fill="none">
          <path d="M2 2l6 6M8 2l-6 6" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </span>
    <span class="tag-chip gray">
      SaigonTech
      <button class="tag-remove">
        <svg width="8" height="8" viewBox="0 0 10 10" fill="none">
          <path d="M2 2l6 6M8 2l-6 6" stroke="var(--slate-500)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </span>
    <span class="tag-chip gray">
      Startup
      <button class="tag-remove">
        <svg width="8" height="8" viewBox="0 0 10 10" fill="none">
          <path d="M2 2l6 6M8 2l-6 6" stroke="var(--slate-500)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </span>
    <button class="tag-add">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
        <path d="M6 2v8M2 6h8" stroke="var(--slate-400)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Add tag
    </button>
  </div>

  <!-- Contact Info -->
  <div class="section-header">Contact Info</div>
  <div class="contact-section">

    <!-- Phone -->
    <div class="contact-row">
      <div class="contact-icon" style="background:var(--green-bg);">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="var(--green)">
          <path d="M5.05 1.73a1.5 1.5 0 00-2.12.01L1.7 3A3 3 0 001 5.12c.14 2.44 1.23 5.28 3.39 7.49C6.59 14.83 9.44 16 11.88 16.2A3 3 0 0014 15.5l1.26-1.26a1.5 1.5 0 000-2.12l-1.7-1.7a1.5 1.5 0 00-2.12 0l-.54.54a.5.5 0 01-.6.08 8.34 8.34 0 01-3.36-3.3.5.5 0 01.07-.6l.53-.54a1.5 1.5 0 000-2.12L5.05 1.73z"/>
        </svg>
      </div>
      <div class="contact-text">
        <div class="contact-type">Phone</div>
        <input class="contact-input" type="tel" value="+84 912 345 678" />
      </div>
    </div>

    <!-- Email -->
    <div class="contact-row">
      <div class="contact-icon" style="background:var(--orange-bg);">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="var(--orange)">
          <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
          <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
        </svg>
      </div>
      <div class="contact-text">
        <div class="contact-type">Email</div>
        <input class="contact-input" type="email" value="james@buildfast.io" />
      </div>
    </div>

  </div>

  <!-- Note -->
  <div class="note-section">
    <div class="section-header">Note</div>
    <div class="note-block">
      <div class="note-inner">
        <textarea class="note-textarea">Met at SaigonTech Summit 2025. Building a SaaS platform for SMEs. Potential partnership for InCard enterprise plan. Follow up in Q2.</textarea>
      </div>
    </div>
  </div>

  <!-- Meta -->
  <div class="meta">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="4" width="18" height="18" rx="2" stroke="var(--slate-400)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 2v4M8 2v4M3 10h18" stroke="var(--slate-400)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Created 10 Mar 2026</span>
  </div>

  <!-- Action Bar: Cancel + Save -->
  <div class="action-bar">
    <button class="btn btn-cancel">Cancel</button>
    <button class="btn btn-save">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M17 21v-8H7v8M7 3v5h8" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Save Changes
    </button>
  </div>

  <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 21v-8h6v8" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="nav-label">Home</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2.5" fill="var(--green)"/><circle cx="19" cy="7" r="2.5" fill="var(--green)"/><circle cx="19" cy="17" r="2.5" fill="var(--green)"/><path d="M7.5 12h5.5M13 12l3.5-4M13 12l3.5 4" stroke="var(--green)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="nav-label active">Network</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-fab-wrap">
        <div class="nav-fab">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="15.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="14" y="18" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="18" width="3" height="3" rx="0.5" fill="white"/></svg>
        </div>
      </div>
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M16.5 7.5l-3 6-5.5 2.5 3-6 5.5-2.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="1" fill="var(--slate-400)"/></svg>
        </div>
        <span class="nav-label">Explore</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round"/></svg>
        </div>
        <span class="nav-label">Profile</span>
        <span class="nav-dot"></span>
      </div>
    </div>

</body>
</html>
