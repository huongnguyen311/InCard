<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Notifications (Requests)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    html { width: 390px; overflow: hidden; }

* { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; scrollbar-width: none; }
    body::-webkit-scrollbar { display: none; }
    body {
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 390px;
      height: 844px;
      background: var(--gray-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--slate-200);
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 44px; height: 44px; border-radius: 9px;
      background: var(--slate-100); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .header-title {
      font-size: 15px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.2px;
    }

    /* ── SEGMENT TABS ── */
    .tabs {
      background: var(--white);
      border-bottom: 1px solid var(--slate-200);
      display: flex; padding: 0 20px; gap: 0; flex-shrink: 0;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 12px 4px 0; gap: 10px; cursor: pointer; position: relative;
    }
    .tab-label {
      font-size: 13px; font-weight: 600; color: var(--slate-400);
      display: flex; align-items: center; gap: 5px; padding-bottom: 11px;
    }
    .tab.active .tab-label { color: var(--green); }
    .tab-underline {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; border-radius: 9999px; background: transparent;
    }
    .tab.active .tab-underline { background: var(--green); }
    .tab-badge {
      min-width: 18px; height: 18px; border-radius: 9999px;
      background: var(--green); color: white;
      font-size: 10px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center; padding: 0 4px;
    }
    .tab-badge.orange { background: #ef5023; }
    .tab-badge.slate  { background: var(--slate-400); }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1; overflow-y: auto; padding: 16px 0 88px;
      display: flex; flex-direction: column;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    .section-label {
      font-size: 11px; font-weight: 700; color: var(--slate-400);
      letter-spacing: 0.8px; text-transform: uppercase;
      padding: 0 20px 8px;
    }

    /* ── REQUEST CARD ── */
    .request-card {
      background: var(--white);
      margin: 0 16px 12px;
      border-radius: 16px;
      border: 1px solid var(--slate-200);
      overflow: hidden;
      position: relative;
    }
    .request-card.unread { border-color: rgba(0,144,55,0.25); }
    .unread-strip {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--green); border-radius: 9999px 0 0 9999px;
    }

    .request-top {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 12px;
    }
    .req-avatar {
      width: 48px; height: 48px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .req-info { flex: 1; min-width: 0; }
    .req-name {
      font-size: 15px; font-weight: 700; color: var(--slate-900);
      margin-bottom: 2px;
    }
    .req-role {
      font-size: 12px; color: var(--slate-500);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .req-time {
      font-size: 11px; font-weight: 500; color: var(--slate-400);
      flex-shrink: 0;
    }

    /* Mutual connections */
    .req-mutual {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px 12px;
    }
    .mutual-avatars { display: flex; }
    .mutual-avatar {
      width: 20px; height: 20px; border-radius: 9999px;
      border: 2px solid white;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; color: white;
      margin-left: -6px;
    }
    .mutual-avatar:first-child { margin-left: 0; }
    .mutual-text { font-size: 11px; color: var(--slate-500); }
    .mutual-text strong { font-weight: 700; color: var(--slate-700); }

    /* Message preview */
    .req-message {
      margin: 0 16px 12px;
      background: var(--slate-50);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px; color: var(--slate-600);
      line-height: 1.5;
      font-style: italic;
      border-left: 3px solid var(--slate-200);
    }

    /* Action buttons */
    .req-actions {
      display: flex; gap: 8px;
      padding: 0 16px 14px;
    }
    .req-btn {
      flex: 1; height: 38px; border-radius: 10px;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px; font-weight: 700;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .req-btn.accept { background: linear-gradient(135deg, #2eb07a 0%, #009037 100%); color: white; }
    .req-btn.decline { background: var(--red-100); color: var(--red-600); }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 32px;
    }
    .empty-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--slate-900); margin-bottom: 6px; text-align: center; }
    .empty-sub { font-size: 13px; color: var(--slate-400); text-align: center; line-height: 1.5; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 390px;
      height: 72px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .nav-link {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px;
      cursor: pointer;
      padding-bottom: 10px;
      position: relative;
    }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--slate-400);
      line-height: 1;
      letter-spacing: 0.1px;
    }
    .nav-label.active { color: var(--green); }
    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0;
    }
    .nav-link:has(.nav-label.active) .nav-dot { opacity: 1; }
    .nav-fab-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 0;
    }
    .nav-fab {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,144,55,0.40), 0 1px 4px rgba(0,0,0,0.12);
      margin-top: -12px;
    }
    .nav-fab svg { width: 22px; height: 22px; }
    .nav-badge { position: absolute; top: 6px; right: 12px; width: 8px; height: 8px; border-radius: 9999px; background: #ef5023; border: 2px solid white; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <button class="back-btn" aria-label="Back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8l4-4" stroke="var(--slate-900)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-title">Notifications</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab">
      <div class="tab-label">
        News
        <span class="tab-badge">5</span>
      </div>
      <div class="tab-underline"></div>
    </div>
    <div class="tab active">
      <div class="tab-label">
        Requests
        <span class="tab-badge orange">3</span>
      </div>
      <div class="tab-underline"></div>
    </div>
    <div class="tab">
      <div class="tab-label">
        Others
        <span class="tab-badge slate">4</span>
      </div>
      <div class="tab-underline"></div>
    </div>
  </div>

  <!-- Content -->
  <div class="scroll-area">

    <div style="height:8px;"></div>

    <!-- Request 1 — Anna Kim -->
    <div class="request-card unread">
      <div class="unread-strip"></div>
      <div class="request-top">
        <div class="req-avatar" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">AK</div>
        <div class="req-info">
          <div class="req-name">Anna Kim</div>
          <div class="req-role">Product Designer · Grab</div>
        </div>
      </div>
      <div class="req-actions">
        <button class="req-btn accept">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M2 8l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Accept
        </button>
        <button class="req-btn decline">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M4 4l8 8M12 4L4 12" stroke="var(--red-600)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Decline
        </button>
      </div>
    </div>

    <!-- Request 2 — Marco Rossi -->
    <div class="request-card unread">
      <div class="unread-strip"></div>
      <div class="request-top">
        <div class="req-avatar" style="background: linear-gradient(135deg, #f59e0b, #ef5023);">MR</div>
        <div class="req-info">
          <div class="req-name">Marco Rossi</div>
          <div class="req-role">VP Sales · Finova Group</div>
        </div>
      </div>
      <div class="req-actions">
        <button class="req-btn accept">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M2 8l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Accept
        </button>
        <button class="req-btn decline">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M4 4l8 8M12 4L4 12" stroke="var(--red-600)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Decline
        </button>
      </div>
    </div>

    <!-- Request 3 — Sara Nguyen -->
    <div class="request-card unread">
      <div class="unread-strip"></div>
      <div class="request-top">
        <div class="req-avatar" style="background: linear-gradient(135deg, #0ea5e9, #6366f1);">SN</div>
        <div class="req-info">
          <div class="req-name">Sara Nguyen</div>
          <div class="req-role">Founder · SeedBridge Capital</div>
        </div>
      </div>
      <div class="req-actions">
        <button class="req-btn accept">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M2 8l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Accept
        </button>
        <button class="req-btn decline">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M4 4l8 8M12 4L4 12" stroke="var(--red-600)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Decline
        </button>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 21v-8h6v8" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="nav-label">Home</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="7" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><circle cx="19" cy="17" r="2.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M7.5 12h5.5M13 12l3.5-4M13 12l3.5 4" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="nav-label">Network</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-fab-wrap">
        <div class="nav-fab">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="15.5" y="4.5" width="4" height="4" rx="0.5" fill="white"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.75"/><rect x="4.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="14" width="3" height="3" rx="0.5" fill="white"/><rect x="14" y="18" width="3" height="3" rx="0.5" fill="white"/><rect x="18" y="18" width="3" height="3" rx="0.5" fill="white"/></svg>
        </div>
      </div>
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="var(--green)" fill-opacity="0.12" stroke="var(--green)" stroke-width="1.75"/><path d="M16.5 7.5l-3 6-5.5 2.5 3-6 5.5-2.5z" fill="var(--green)" stroke="var(--green)" stroke-width="0.5" stroke-linejoin="round"/></svg>
        </div>
        <span class="nav-label active">Explore</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-link">
        <div class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="var(--slate-400)" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="var(--slate-400)" stroke-width="1.75" stroke-linecap="round"/></svg>
        </div>
        <span class="nav-label">Profile</span>
        <span class="nav-dot"></span>
      </div>
    </div>

</body>
</html>
