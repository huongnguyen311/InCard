<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Portfolio Images — InCard</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green: #009037;
      --green-dark: #007a2f;
      --green-light: #2eb07a;
      --green-bg: rgba(0,144,55,0.08);
      --green-surface: #dcfce7;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --slate-50: #f8fafc;
      --white: #ffffff;
      --red-500: #ef4444;
      --red-50: #fef2f2;
      --red-100: #fee2e2;
      --orange:        #ef5023;
      --orange-light:  #fa987d;
      --orange-bg:     rgba(239,80,35,0.1);
    }

    html, body {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar {
      display: none;
    }

    body {
      background: #0f172a;
      font-family: 'Public Sans', sans-serif;
      margin: 0;
      padding: 48px 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .screen {
      width: 390px;
      min-height: 844px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border-radius: 44px;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #0f4c29 0%, #0a2e1a 60%, #071a0f 100%);
    }

    .bg-cover {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 220px;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80') center / cover;
      opacity: 0.18;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
    }

    .sheet {
      background: white;
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
      position: relative;
      z-index: 10;
    }

    .handle-wrap {
      padding: 14px 0 0;
      display: flex;
      justify-content: center;
    }

    .handle {
      width: 40px;
      height: 4px;
      background: var(--slate-200);
      border-radius: 9999px;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 4px;
    }

    .sheet-title {
      font-weight: 700;
      font-size: 20px;
      color: var(--slate-900);
      letter-spacing: -0.5px;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      background: var(--slate-100);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .tab-switcher {
      margin: 16px 24px 0;
      background: var(--slate-100);
      border-radius: 12px;
      padding: 4px;
      display: flex;
      gap: 2px;
    }

    .tab {
      flex: 1;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'Public Sans', sans-serif;
    }

    .tab.inactive {
      background: transparent;
      color: var(--slate-500);
    }

    .tab.active {
      background: white;
      color: var(--green);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--slate-400);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin: 20px 24px 10px;
    }

    .image-grid {
      margin: 0 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .image-slot {
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .image-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
    }

    .add-slot {
      aspect-ratio: 1;
      border: 2px dashed var(--slate-200);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      font-size: 24px;
      color: var(--slate-400);
      font-weight: 300;
      line-height: 1;
    }

    .divider {
      height: 1px;
      background: var(--slate-100);
      margin: 20px 24px;
    }

    .form-fields {
      margin: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--slate-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field-input {
      height: 48px;
      background: var(--slate-50);
      border: 1.5px solid var(--slate-200);
      border-radius: 12px;
      padding: 0 16px;
      color: var(--slate-400);
      font-size: 14px;
      font-family: 'Public Sans', sans-serif;
      box-sizing: border-box;
      width: 100%;
      outline: none;
    }

    .field-textarea {
      min-height: 72px;
      background: var(--slate-50);
      border: 1.5px solid var(--slate-200);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--slate-400);
      font-size: 14px;
      font-family: 'Public Sans', sans-serif;
      box-sizing: border-box;
      width: 100%;
      outline: none;
      resize: none;
      line-height: 1.5;
    }

    .footer {
      padding: 20px 24px 40px;
    }

        .btn-primary {
      font-weight: 700;
      font-size: 16px;
      color: white;
      font-family: 'Public Sans', sans-serif;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="bg-layer"></div>
    <div class="bg-cover"></div>
    <div class="bg-overlay"></div>

    <div class="sheet">
      <div class="handle-wrap">
        <div class="handle"></div>
      </div>

      <div class="sheet-header">
        <div class="sheet-title">Add Portfolio</div>
        <button class="close-btn" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="tab-switcher">
        <button class="tab inactive">Video</button>
        <button class="tab active">Images</button>
      </div>

      <div class="section-label">Upload Images</div>

      <div class="image-grid">
        <div class="image-slot">
          <img src="https://images.unsplash.com/photo-1542744094-3a31f272c490?w=200&q=80" alt="Portfolio image 1" />
          <button class="remove-btn" aria-label="Remove image">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1 1l8 8M9 1L1 9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="image-slot">
          <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=200&q=80" alt="Portfolio image 2" />
          <button class="remove-btn" aria-label="Remove image">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1 1l8 8M9 1L1 9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <button class="add-slot" aria-label="Add image">+</button>
      </div>

      <div class="divider"></div>

      <div class="form-fields">
        <div class="field-group">
          <div class="field-label">Title</div>
          <input type="text" class="field-input" placeholder="UI Design System" />
        </div>
        <div class="field-group">
          <div class="field-label">Description</div>
          <textarea class="field-textarea" placeholder="A collection of reusable UI components..."></textarea>
        </div>
      </div>

      <div class="footer">
        <button class="btn-primary">Save Portfolio</button>
      </div>
    </div>
  </div>
</body>
</html>
