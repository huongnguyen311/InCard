<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activation Success — InCard</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green: #009037;
      --green-dark: #007a2f;
      --green-light: #2eb07a;
      --green-bg: rgba(0,144,55,0.08);
      --green-surface: #dcfce7;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --slate-50: #f8fafc;
      --white: #ffffff;
      --red-500: #ef4444;
      --red-50: #fef2f2;
      --red-100: #fee2e2;
      --orange:        #ef5023;
      --orange-light:  #fa987d;
      --orange-bg:     rgba(239,80,35,0.1);
    }

    html, body {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar {
      display: none;
    }

    body {
      background: #0f172a;
      font-family: 'Public Sans', sans-serif;
      margin: 0;
      padding: 0;
    }

    .screen {
      width: 390px;
      min-height: 844px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #0f4c29 0%, #0a2e1a 60%, #071a0f 100%);
    }

    .bg-cover {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 220px;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80') center / cover;
      opacity: 0.18;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
    }

    .sheet {
      background: white;
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
      position: relative;
      z-index: 10;
      overflow: hidden;
    }

    .handle-wrap {
      padding: 14px 0 0;
      display: flex;
      justify-content: center;
    }

    .handle {
      width: 40px;
      height: 4px;
      background: var(--slate-200);
      border-radius: 9999px;
    }

    .confetti-dot {
      position: absolute;
      border-radius: 50%;
    }

    .icon-area {
      display: flex;
      justify-content: center;
      padding: 40px 24px 20px;
    }

    .icon-outer-glow {
      width: 110px;
      height: 110px;
      border: 2px solid rgba(0,144,55,0.15);
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-middle-ring {
      width: 88px;
      height: 88px;
      background: var(--green-surface);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .icon-inner-circle {
      width: 68px;
      height: 68px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,144,55,0.35);
      position: relative;
      z-index: 1;
    }

    .success-title {
      text-align: center;
      font-weight: 800;
      font-size: 24px;
      color: var(--slate-900);
      letter-spacing: -0.6px;
      padding: 0 24px;
      margin: 0;
    }

    .success-subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--slate-500);
      line-height: 1.6;
      padding: 8px 40px 28px;
      margin: 0;
    }

    .card-preview {
      margin: 0 24px 28px;
      background: linear-gradient(135deg, #009037 0%, #2eb07a 100%);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .card-pattern-circle-1 {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      top: -30px;
      right: -20px;
    }

    .card-pattern-circle-2 {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      bottom: -30px;
      left: -10px;
    }

    .card-content-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .card-name {
      color: white;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 3px;
    }

    .card-role {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      font-weight: 400;
    }

    .active-badge {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 4px 10px;
      position: relative;
      z-index: 1;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
    }

    .active-label {
      color: white;
      font-weight: 600;
      font-size: 11px;
    }

    .footer {
      padding: 0 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

        .btn-primary {
      font-weight: 700;
      font-size: 16px;
      color: white;
      font-family: 'Public Sans', sans-serif;
    }

    .btn-ghost {
      height: 48px;
      border: 1.5px solid var(--slate-200);
      border-radius: 14px;
      background: transparent;
      color: var(--slate-500);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'Public Sans', sans-serif;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="bg-layer"></div>
    <div class="bg-cover"></div>
    <div class="bg-overlay"></div>

    <div class="sheet">
      <div class="handle-wrap">
        <div class="handle"></div>
      </div>

      <!-- Confetti dots scattered near top of sheet -->
      <div class="confetti-dot" style="width:8px;height:8px;background:#fbbf24;top:28px;left:52px;"></div>
      <div class="confetti-dot" style="width:6px;height:6px;background:var(--green-light);top:44px;left:88px;"></div>
      <div class="confetti-dot" style="width:9px;height:9px;background:#ef5023;top:20px;right:80px;"></div>
      <div class="confetti-dot" style="width:7px;height:7px;background:#fa987d;top:52px;right:52px;"></div>
      <div class="confetti-dot" style="width:10px;height:10px;background:#ef5023;top:36px;left:160px;"></div>
      <div class="confetti-dot" style="width:6px;height:6px;background:var(--green);top:60px;right:110px;"></div>

      <div class="icon-area">
        <div class="icon-outer-glow">
          <div class="icon-middle-ring"></div>
          <div class="icon-inner-circle">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
              <path d="M7 15.5l5.5 5.5L23 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>

      <p class="success-title">Card Activated!</p>
      <p class="success-subtitle">Your InCard is now live. Start sharing your digital profile with a tap.</p>

      <div class="footer">
        <button class="btn-primary">View My Profile</button>
        <button class="btn-ghost">Go to Dashboard</button>
      </div>
    </div>
  </div>
</body>
</html>
