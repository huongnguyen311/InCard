<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Compact Add Service Modal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 390px; overflow: hidden; }
body {
      background: var(--gray-bg);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
    
      width: 390px;
    }
    .screen {
      width: 390px;
      background: var(--gray-bg);
      position: relative;
      min-height: 844px;
    
      border-radius: 44px;
      overflow: hidden;
    }

    /* ── Blurred backdrop ── */
    .backdrop {
      position: absolute;
      inset: 0;
      background: var(--backdrop);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      z-index: 10;
    }

    /* ── Bottom Sheet ── */
    .bottom-sheet {
      background: var(--white);
      border-radius: 32px 32px 0 0;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
    }

    .handle-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 24px;
      padding: 13px 0 5px;
    }
    .handle-bar .handle {
      width: 48px;
      height: 6px;
      border-radius: 9999px;
      background: var(--slate-200);
    }

    /* ── Header ── */
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 8px;
    }
    .sheet-header .close-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }
    .close-btn svg { display: block; }
    .sheet-header .title {
      flex: 1;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.5px;
      padding-right: 20px;
    }

    /* ── Body ── */
    .sheet-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Image Upload Section */
    .upload-section {
      background: var(--slate-50);
      border: 2px dashed var(--slate-200);
      border-radius: 12px;
      padding: 42px 26px;
    }
    .upload-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .upload-icon {
      width: 42px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .upload-icon svg { display: block; }
    .upload-info { flex: 1; }
    .upload-info .upload-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--slate-900);
      line-height: 1.25;
    }
    .upload-info .upload-hint {
      font-size: 12px;
      font-weight: 400;
      color: var(--slate-500);
      line-height: 1.33;
      margin-top: 2px;
    }
    .btn-upload {
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      height: 36px;
      padding: 0 16px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    /* Input Fields */
    .input-fields {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-group label {
      font-size: 14px;
      font-weight: 600;
      color: var(--slate-700);
      padding-left: 4px;
      line-height: 1.43;
    }
    .field-group input,
    .field-group textarea {
      background: var(--white);
      border: 1px solid var(--slate-200);
      border-radius: 12px;
      font-family: 'Public Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--slate-900);
      padding: 17px 16px;
      width: 100%;
      outline: none;
    }
    .field-group input::placeholder,
    .field-group textarea::placeholder {
      color: var(--placeholder);
    }
    .field-group textarea {
      height: 120px;
      resize: none;
      padding: 16px;
      line-height: 1.5;
    }
    /* Link input wrapper */
    .link-input-wrapper {
      position: relative;
    }
    .link-input-wrapper input {
      padding-right: 44px;
    }
    .link-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--slate-400);
      pointer-events: none;
    }

    /* Action Buttons */
    .action-buttons {
      margin-top: 24px;
      display: flex;
      gap: 16px;
      padding: 16px 0 32px;
    }
    .btn-cancel {
      background: var(--slate-100);
      color: var(--slate-700);
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      height: 56px;
      flex: 0 0 109px;
      cursor: pointer;
    }
    .btn-save {
      background: linear-gradient(135deg, #2eb07a 0%, #009037 100%);
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      height: 56px;
      flex: 1;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,144,55,0.2), 0 2px 4px -2px rgba(0,144,55,0.2);
    }

    .safe-area-bottom {
      height: 16px;
      background: var(--white);
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">
    <!-- blurred profile content behind -->
    <div style="position:absolute;inset:0;background:var(--gray-bg);"></div>

    <div class="backdrop">
      <div class="bottom-sheet">
        <div class="handle-bar"><div class="handle"></div></div>

        <div class="sheet-header">
          <button class="close-btn" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1L13 13M13 1L1 13" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="title">Add Service / Product</span>
        </div>

        <div class="sheet-body">
          <!-- Upload section -->
          <div class="upload-section">
            <div class="upload-row">
              <div class="upload-icon">
                <svg width="42" height="40" viewBox="0 0 42 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect width="42" height="40" rx="8" fill="var(--green-bg)"/>
                  <path d="M21 13v9m0 0l-3-3m3 3l3-3M15 27h12" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="25" cy="17" r="4.5" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1.2"/>
                  <path d="M23.5 17.5l1 1 2-2" stroke="var(--green)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="upload-info">
                <div class="upload-label">Upload Images</div>
                <div class="upload-hint">Up to 3 photos</div>
              </div>
              <button class="btn-upload">Upload</button>
            </div>
          </div>

          <!-- Input fields -->
          <div class="input-fields">
            <div class="field-group">
              <label for="svc-name">Service / Product Name</label>
              <input type="text" id="svc-name" placeholder="Enter name" />
            </div>

            <div class="field-group">
              <label for="svc-link">Service / Product Link</label>
              <div class="link-input-wrapper">
                <input type="url" id="svc-link" placeholder="https://" />
                <span class="link-icon">
                  <svg width="20" height="10" viewBox="0 0 20 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5H12M5 5a2 2 0 1 0 0-4H3a2 2 0 0 0 0 4h2zm10 0a2 2 0 1 0 0-4h-2a2 2 0 0 0 0 4h2z" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                </span>
              </div>
            </div>

            <div class="field-group">
              <label for="svc-desc">Description</label>
              <textarea id="svc-desc" placeholder="Write a short description of what you offer..."></textarea>
            </div>
          </div>

          <!-- Action buttons -->
          <div class="action-buttons">
            <button class="btn-cancel">Cancel</button>
            <button class="btn-save">Save Product</button>
          </div>
        </div>

        <div class="safe-area-bottom"></div>
      </div>
    </div>
  </div>
</body>
</html>
