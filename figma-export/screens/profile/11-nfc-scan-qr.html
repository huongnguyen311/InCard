<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — NFC Step 1: Scan QR Code</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green:         #009037;
      --green-dark:    #007a2f;
      --green-light:   #2eb07a;
      --green-bg:      rgba(0,144,55,0.08);
      --green-surface: #dcfce7;
      --slate-900:     #0f172a;
      --slate-800:     #1e293b;
      --slate-700:     #334155;
      --slate-600:     #475569;
      --slate-500:     #64748b;
      --slate-400:     #94a3b8;
      --slate-200:     #e2e8f0;
      --slate-100:     #f1f5f9;
      --slate-50:      #f8fafc;
      --white:         #ffffff;
      --orange:        #ef5023;
      --orange-light:  #fa987d;
      --orange-bg:     rgba(239,80,35,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    body {
      font-family: 'Public Sans', sans-serif;
      background: #0f172a;
      margin: 0; padding: 0;
    }
    .screen {
      width: 390px;
      min-height: 844px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .bg-layer {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #0f4c29 0%, #0a2e1a 60%, #071a0f 100%);
    }
    .bg-cover {
      position: absolute; top: 0; left: 0; right: 0; height: 220px;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80') center/cover;
      opacity: 0.18;
    }
    .bg-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
    }

    .sheet {
      background: white;
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
      position: relative;
      z-index: 10;
    }
    .handle-wrap { padding: 14px 0 0; display: flex; justify-content: center; }
    .handle { width: 40px; height: 4px; background: var(--slate-200); border-radius: 9999px; }

    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 4px;
    }
    .sheet-header-left { display: flex; flex-direction: column; gap: 4px; }
    .sheet-title { font-weight: 700; font-size: 20px; color: var(--slate-900); letter-spacing: -0.5px; }
    .sheet-subtitle { font-size: 13px; color: var(--slate-500); font-weight: 400; }
    .close-btn {
      width: 32px; height: 32px;
      background: var(--slate-100); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; flex-shrink: 0;
    }

    /* Step indicator */
    .step-indicator {
      display: flex; align-items: center; justify-content: center;
      padding: 20px 24px 0;
    }
    .step-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .step-circle {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; flex-shrink: 0;
    }
    .step-circle.active { background: var(--green); color: white; border: 2px solid var(--green); }
    .step-circle.inactive { border: 2px solid var(--slate-300); color: var(--slate-400); background: transparent; }
    .step-label { font-size: 11px; font-weight: 600; }
    .step-label.active { color: var(--green); }
    .step-label.inactive { color: var(--slate-400); }
    .step-connector { width: 60px; height: 2px; background: var(--slate-200); margin: 0 6px 16px; }

    /* Illustration */
    .illustration-area {
      background: var(--slate-50);
      border-radius: 24px;
      margin: 16px 24px;
      padding: 28px 24px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
      min-height: 220px; position: relative; overflow: hidden;
    }

    /* Viewfinder */
    .viewfinder {
      width: 180px; height: 180px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .vf-corner {
      position: absolute;
      width: 22px; height: 22px;
    }
    .vf-corner.tl { top: 0; left: 0; border-top: 2.5px solid var(--green); border-left: 2.5px solid var(--green); border-radius: 6px 0 0 0; }
    .vf-corner.tr { top: 0; right: 0; border-top: 2.5px solid var(--green); border-right: 2.5px solid var(--green); border-radius: 0 6px 0 0; }
    .vf-corner.bl { bottom: 0; left: 0; border-bottom: 2.5px solid var(--green); border-left: 2.5px solid var(--green); border-radius: 0 0 0 6px; }
    .vf-corner.br { bottom: 0; right: 0; border-bottom: 2.5px solid var(--green); border-right: 2.5px solid var(--green); border-radius: 0 0 6px 0; }

    /* Scan line */
    .scan-line {
      position: absolute;
      left: 8px; right: 8px; top: 50%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 9999px;
      opacity: 0.7;
    }

    /* QR code illustration */
    .qr-wrap { opacity: 0.2; }

    .vf-hint {
      margin-top: 16px;
      font-size: 12px; font-weight: 500;
      color: var(--slate-400);
      text-align: center; line-height: 1.6;
      max-width: 220px;
    }

    /* Physical card below viewfinder */
    .card-hint {
      margin-top: 14px;
      display: flex; align-items: center; gap: 10px;
      background: white;
      border: 1px solid var(--slate-200);
      border-radius: 12px;
      padding: 10px 14px;
      width: 100%;
    }
    .card-hint-icon {
      width: 36px; height: 36px;
      background: var(--green-bg);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-hint-text { font-size: 12px; color: var(--slate-600); line-height: 1.4; }
    .card-hint-text strong { color: var(--slate-800); font-weight: 600; }

    .footer { padding: 20px 24px 44px; }
        .btn-primary {
      font-weight: 700;
      font-size: 16px;
      color: white;
      font-family: 'Public Sans', sans-serif;
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="bg-layer"></div>
    <div class="bg-cover"></div>
    <div class="bg-overlay"></div>

    <div class="sheet">
      <div class="handle-wrap"><div class="handle"></div></div>

      <div class="sheet-header">
        <div class="sheet-header-left">
          <div class="sheet-title">Scan QR Code</div>
          <div class="sheet-subtitle">Point your camera at the card's QR code</div>
        </div>
        <button class="close-btn" aria-label="Close">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="var(--slate-500)" stroke-width="2.5" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
        </button>
      </div>

      <!-- Illustration -->
      <div class="illustration-area">
        <div class="viewfinder">
          <div class="vf-corner tl"></div>
          <div class="vf-corner tr"></div>
          <div class="vf-corner bl"></div>
          <div class="vf-corner br"></div>
          <div class="scan-line"></div>
          <div class="qr-wrap">
            <svg width="80" height="80" viewBox="0 0 36 36" fill="none">
              <rect x="3" y="3" width="12" height="12" rx="1" stroke="#334155" stroke-width="2"/>
              <rect x="7" y="7" width="4" height="4" fill="#334155"/>
              <rect x="21" y="3" width="12" height="12" rx="1" stroke="#334155" stroke-width="2"/>
              <rect x="25" y="7" width="4" height="4" fill="#334155"/>
              <rect x="3" y="21" width="12" height="12" rx="1" stroke="#334155" stroke-width="2"/>
              <rect x="7" y="25" width="4" height="4" fill="#334155"/>
              <rect x="21" y="21" width="4" height="4" fill="#334155"/>
              <rect x="21" y="29" width="4" height="4" fill="#334155"/>
              <rect x="29" y="21" width="4" height="4" fill="#334155"/>
              <rect x="25" y="25" width="4" height="4" fill="#334155"/>
              <rect x="29" y="29" width="4" height="4" fill="#334155"/>
            </svg>
          </div>
        </div>

        <div class="vf-hint">Align the QR code within the frame to scan</div>

        <div class="card-hint">
          <div class="card-hint-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          </div>
          <div class="card-hint-text"><strong>Where to find it?</strong> QR code is on the back of your physical InCard</div>
        </div>
      </div>

      <div class="footer">
        <button class="btn-primary">Scan</button>
      </div>
    </div>
  </div>
</body>
</html>
