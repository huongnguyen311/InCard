<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCard — Connect With Me</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    :root {
      --green:         #009037;
      --green-dark:    #007a2f;
      --green-light:   #2eb07a;
      --green-bg:      rgba(0,144,55,0.1);
      --green-surface: #dcfce7;
      --emerald:       #10b981;
      --emerald-bg:    #ecfdf5;
      --slate-900:     #0f172a;
      --slate-800:     #1e293b;
      --slate-700:     #334155;
      --slate-600:     #475569;
      --slate-500:     #64748b;
      --slate-400:     #94a3b8;
      --slate-300:     #cbd5e1;
      --slate-200:     #e2e8f0;
      --slate-100:     #f1f5f9;
      --slate-50:      #f8fafc;
      --white:         #ffffff;
      --border-light:  #f3f4f6;
      --red-100:       #fee2e2;
      --red-500:       #ef4444;
      --red-600:       #dc2626;
      --orange:        #ef5023;
      --orange-light:  #fa987d;
      --orange-bg:     rgba(239,80,35,0.1);
      --whatsapp:      #10b981;
      --zalo:          #2563eb;
      --x-dark:        #1e293b;
      --facebook:      #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    body {
      background: var(--white);
      font-family: 'Public Sans', sans-serif;
      margin: 0; padding: 0;
    }

    .screen {
      width: 390px;
      min-height: 844px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .bg-layer {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #0f4c29 0%, #0a2e1a 60%, #071a0f 100%);
    }
    .bg-cover {
      position: absolute; top: 0; left: 0; right: 0; height: 220px;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80') center / cover;
      opacity: 0.18;
    }
    .bg-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
    }

    .sheet {
      background: white;
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
    }

    .handle-wrap {
      padding: 14px 0 0;
      display: flex; justify-content: center;
      flex-shrink: 0;
    }
    .handle {
      width: 40px; height: 4px;
      background: var(--slate-200);
      border-radius: 9999px;
    }

    .sheet-header {
      padding: 18px 20px 14px;
      display: flex; flex-direction: column; gap: 2px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-light);
    }
    .sheet-header-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .sheet-title {
      font-weight: 700; font-size: 18px; color: var(--slate-800);
    }
    .sheet-subtitle {
      font-size: 13px; color: var(--slate-400); margin-top: 2px;
    }
    .close-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; flex-shrink: 0;
    }

    .sheet-body {
      padding: 8px 0;
    }

    .section-label {
      font-weight: 700; font-size: 11px; color: var(--slate-400);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 12px 20px 6px;
    }

    .platform-row {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px; cursor: pointer;
    }
    .platform-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .platform-name {
      flex: 1; font-weight: 600; font-size: 15px; color: var(--slate-800);
    }
    .chevron { color: var(--slate-300); flex-shrink: 0; }

    .section-divider {
      height: 1px; background: var(--border-light);
      margin: 4px 20px;
    }

    .sheet-footer {
      padding: 14px 20px 32px;
      flex-shrink: 0;
      border-top: 1px solid var(--border-light);
    }
        .btn-submit {
      font-weight: 700;
      font-size: 16px;
      color: white;
      font-family: 'Public Sans', sans-serif;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="bg-layer"></div>
    <div class="bg-cover"></div>
    <div class="bg-overlay"></div>

    <div class="sheet">
      <div class="handle-wrap"><div class="handle"></div></div>

      <div class="sheet-header">
        <div class="sheet-header-row">
          <span class="sheet-title">Connect With Me</span>
          <button class="close-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--slate-500)" stroke-width="2" stroke-linecap="round">
              <line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/>
            </svg>
          </button>
        </div>
        <span class="sheet-subtitle">Select a platform to add</span>
      </div>

      <div class="sheet-body">

        <div class="section-label">Social Media</div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#3b82f6;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          </div>
          <span class="platform-name">Facebook</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke-width="2.5"/></svg>
          </div>
          <span class="platform-name">Instagram</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#0a66c2;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 6a2 2 0 100-4 2 2 0 000 4z"/></svg>
          </div>
          <span class="platform-name">LinkedIn</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#1e293b;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.254 5.622L18.245 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
          </div>
          <span class="platform-name">X / Twitter</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#dc2626;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          </div>
          <span class="platform-name">YouTube</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#0f172a;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.17 8.17 0 004.78 1.52V6.73a4.85 4.85 0 01-1.01-.04z"/></svg>
          </div>
          <span class="platform-name">TikTok</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="section-divider"></div>
        <div class="section-label">Messaging</div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#10b981;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2C6.477 2 2 6.484 2 12.017c0 1.99.525 3.853 1.44 5.461L2.05 22l4.635-1.21A9.954 9.954 0 0012 22c5.523 0 10-4.484 10-10.017C22 6.484 17.522 2 12 2z"/></svg>
          </div>
          <span class="platform-name">WhatsApp</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#2563eb;">
            <span style="color:white;font-weight:800;font-size:18px;font-family:'Public Sans',sans-serif;line-height:1;">Z</span>
          </div>
          <span class="platform-name">Zalo</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#0088cc;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
          </div>
          <span class="platform-name">Telegram</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.908 1.374 5.504 3.53 7.264V22l3.22-1.768A10.7 10.7 0 0012 20.486c5.523 0 10-4.145 10-9.243S17.523 2 12 2zm1.016 12.44l-2.547-2.716-4.97 2.716 5.468-5.806 2.61 2.716 4.908-2.716-5.469 5.806z"/></svg>
          </div>
          <span class="platform-name">Messenger</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="section-divider"></div>
        <div class="section-label">Other</div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#334155;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 13.5 19.79 19.79 0 01.01 4.86 2 2 0 012 2.69h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 10.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <span class="platform-name">Phone</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row">
          <div class="platform-icon" style="background:#009037;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          </div>
          <span class="platform-name">Website</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

        <div class="platform-row" style="margin-bottom:4px;">
          <div class="platform-icon" style="background:#ef5023;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <span class="platform-name">Address</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>

      </div>

      <div class="sheet-footer">
        <button class="btn-submit">Done</button>
      </div>
    </div>
  </div>
</body>
</html>
