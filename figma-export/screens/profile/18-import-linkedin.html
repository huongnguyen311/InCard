<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, viewport-fit=cover" />
  <title>InCard — Import from LinkedIn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../button-system.css" />
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
body {
      background: #0f172a;
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0; padding: 0;
    
      width: 390px;
    }

    .screen {
      width: 390px;
      min-height: 844px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    
      border-radius: 44px;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #0a2d4a 0%, #061828 60%, #030e18 100%);
    }
    .bg-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
    }

    /* ── BOTTOM SHEET ── */
    .sheet {
      background: white;
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
    }

    .handle-wrap {
      padding: 14px 0 0;
      display: flex; justify-content: center;
    }
    .handle {
      width: 40px; height: 4px;
      background: var(--slate-200); border-radius: 9999px;
    }

    .sheet-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 18px 24px 4px;
    }
    .header-left { display: flex; flex-direction: column; gap: 4px; }
    .header-title-row {
      display: flex; align-items: center; gap: 10px;
    }
    .linkedin-icon-wrap {
      width: 32px; height: 32px;
      background: var(--linkedin);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sheet-title {
      font-weight: 700; font-size: 20px;
      color: var(--slate-900); letter-spacing: -0.5px;
    }
    .sheet-subtitle {
      font-size: 13px; color: var(--slate-400);
      padding-left: 2px;
    }
    .close-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--slate-100);
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; flex-shrink: 0;
    }

    /* ── URL INPUT ROW ── */
    .url-row {
      margin: 18px 24px 0;
      padding-bottom: 24px;
      display: flex; gap: 10px; align-items: center;
    }
    .url-input-wrap { flex: 1; position: relative; }
    .url-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none;
    }
    .url-input {
      width: 100%; height: 48px;
      background: var(--linkedin-bg);
      border: 1.5px solid var(--linkedin-border);
      border-radius: 12px;
      padding: 0 12px 0 38px;
      font-family: 'Public Sans', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--slate-800);
      outline: none;
    }
    .url-input:focus { border-color: var(--linkedin); background: white; }
    .url-input::placeholder { color: var(--slate-400); }
    .fetch-btn {
      height: 48px; padding: 0 18px;
      background: var(--linkedin);
      border-radius: 12px; border: none; cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-weight: 700; font-size: 13px; color: white;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(10,102,194,0.25);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-weight: 700; font-size: 11px; color: var(--slate-400);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 18px 24px 10px;
    }

    /* ── IMPORT FIELD ROWS ── */
    .import-list {
      padding: 0 24px;
      display: flex; flex-direction: column;
    }
    .import-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
    }
    .import-row:last-child { border-bottom: none; }

    .import-checkbox {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--slate-300);
      background: white;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .import-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .import-field-info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .import-field-label { font-weight: 600; font-size: 14px; color: var(--slate-800); }
    .import-field-preview {
      font-size: 12px; color: var(--slate-400);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .field-badge {
      font-size: 10px; font-weight: 700;
      border-radius: 999px; padding: 3px 9px;
      flex-shrink: 0;
    }
    .badge-overwrite { color: #d97706; background: #fef3c7; }
    .badge-new      { color: var(--green); background: var(--green-surface); }
    .badge-skip     { color: var(--slate-400); background: var(--slate-100); }

    /* ── FOOTER ── */
    .sheet-footer {
      padding: 16px 24px 40px;
      display: flex; gap: 12px;
    }
    .btn-cancel {
      flex: 1; height: 52px;
      background: transparent;
      border: 1.5px solid var(--slate-200);
      border-radius: 14px; cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-weight: 600; font-size: 15px; color: var(--slate-500);
    }
    .btn-import {
      flex: 1.6; height: 52px;
      background: var(--linkedin);
      border-radius: 14px; border: none; cursor: pointer;
      font-family: 'Public Sans', sans-serif;
      font-weight: 700; font-size: 15px; color: white;
      box-shadow: 0 4px 16px rgba(10,102,194,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div class="sheet">
      <div class="handle-wrap"><div class="handle"></div></div>

      <div class="sheet-header">
        <div class="header-left">
          <div class="header-title-row">
            <div class="linkedin-icon-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 6a2 2 0 100-4 2 2 0 000 4z"/></svg>
            </div>
            <span class="sheet-title">Import from LinkedIn</span>
          </div>
          <span class="sheet-subtitle">Pull data from your LinkedIn profile into InCard</span>
        </div>
        <button class="close-btn" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- URL Input -->
      <div class="url-row">
        <div class="url-input-wrap">
          <svg class="url-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 6a2 2 0 100-4 2 2 0 000 4z" fill="#0a66c2"/>
          </svg>
          <input class="url-input" type="url" value="linkedin.com/in/alexrivera" placeholder="linkedin.com/in/yourprofile" />
        </div>
      </div>

      <div class="sheet-footer">
        <button class="btn-cancel">Cancel</button>
        <button class="btn-import">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Extract
        </button>
      </div>
    </div>
  </div>
</body>
</html>
